---
id: passkey_search
name: Passkey Search Fixture
description: "A def whose search input carries a passkey, for redaction testing."
language: en-US
type: public
encoding: UTF-8
links:
  - https://passkey.invalid/

caps:
  categorymappings:
    - {id: 1, cat: Movies}
  modes:
    search: [q]

settings:
  - name: passkey
    type: text
    label: Passkey

search:
  path: /browse
  inputs:
    q: "{{ .Keywords }}"
    passkey: "{{ .Config.passkey }}"
  rows:
    selector: tr.row
  fields:
    title:
      selector: a.title
    download:
      selector: a.dl
      attribute: href
    size:
      selector: td.size
    seeders:
      selector: td.seeders
    leechers:
      selector: td.leechers
    category:
      text: "1"
