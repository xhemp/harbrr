---
id: rotating_session
name: Rotating Session Fixture
description: "Form login whose POST 302 rotates the session cookie; the search must carry ONLY the fresh cookie."
language: en-US
type: private
encoding: UTF-8
links:
  - https://rotate.invalid/

caps:
  categorymappings:
    - {id: 1, cat: Movies}
  modes:
    search: [q]

login:
  path: /login.php
  method: form
  form: form#loginform
  inputs:
    username: alice
    password: hunter2-fixture

search:
  path: /browse
  inputs:
    q: "{{ .Keywords }}"
  rows:
    selector: tr.row
  fields:
    title:
      selector: a.title
    download:
      selector: a.dl
      attribute: href
    size:
      selector: td.size
    seeders:
      selector: td.seeders
    category:
      text: "1"
