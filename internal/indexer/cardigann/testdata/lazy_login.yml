---
id: lazy_login
name: Lazy Login Fixture
description: "Login+test def exercising lazy relogin on a logged-out search response."
language: en-US
type: private
encoding: UTF-8
links:
  - https://lazy.invalid/

caps:
  categorymappings:
    - {id: 1, cat: Movies}
  modes:
    search: [q]

login:
  path: /login.php
  method: get
  test:
    path: /profile
    selector: a.logout

search:
  path: /browse
  inputs:
    q: "{{ .Keywords }}"
  rows:
    selector: tr.row
  fields:
    title:
      selector: a.title
    download:
      selector: a.dl
      attribute: href
    size:
      selector: td.size
    seeders:
      selector: td.seeders
    category:
      text: "1"
