name: matrix-download-link
archetype: download-link-prerequest
golden_source: hand-derived
mode: search
resolve_download: true
description: >
  Compatibility matrix: download-link pre-request. The search result's download
  field is a DETAILS page (/details/1), not the torrent. The download block then
  resolves it: a "before" pre-request (GET /prepare), then the a.torrent-dl
  selector over the fetched details page yields /get/1.torrent, resolved against
  the details URL. Because the definition does not disable testlinktorrent (default
  true in Jackett), the resolved non-magnet link is then fetched and accepted
  because its body is a bencoded torrent (first byte 'd'). With resolve_download
  set, the harness rewrites the release link to that resolved torrent URL, so the
  golden's link is https://dl.test/get/1.torrent. Size 2 GB = 2147483648; peers = 17 + 3.
definition: definition.yml
query:
  keywords: release
steps:
  - method: GET
    url: https://dl.test/browse?q=release
    response: search.html
    note: search
  - method: GET
    url: https://dl.test/prepare
    response: prepare.html
    note: download.before pre-request
  - method: GET
    url: https://dl.test/details/1
    response: details.html
    note: fetch the details page; a.torrent-dl yields the real torrent URL
  - method: GET
    url: https://dl.test/get/1.torrent
    response: torrent.bin
    note: testlinktorrent validation — bencoded body (first byte 'd') accepts the link
