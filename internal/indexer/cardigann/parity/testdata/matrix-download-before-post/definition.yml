---
id: downloadbeforepost
name: downloadbeforepost
description: "Synthetic tracker whose download needs a POST pre-request carrying the release id."
language: en-US
type: public
encoding: UTF-8
links:
  - https://dl.test/

caps:
  categorymappings:
    - {id: 1, cat: Movies}
  modes:
    search: [q]

search:
  path: /browse
  inputs:
    q: "{{ .Keywords }}"
  rows:
    selector: tr.row
  fields:
    title:
      selector: a.title
    download:
      selector: a.details
      attribute: href
    size:
      selector: td.size
    seeders:
      selector: td.seeders
    leechers:
      selector: td.leechers
    category:
      text: "1"

download:
  before:
    path: /takethanks.php
    method: post
    inputs:
      torrentid: "{{ .DownloadUri.Query.id }}"
  selectors:
    - selector: a[href*="download.php?id="]
      attribute: href
