description: >
  Stress: the :has and :contains pseudo-classes, end to end. cascadia implements
  both, but its :contains matches case-insensitively where AngleSharp's is
  case-sensitive, so the engine rewrites :contains to a literal-quoted :matches
  (see selector/contains.go) — this pins them through the full
  pipeline, not just the selector unit tests. The row selector `tr:has(a.dl)` keeps
  only the two rows that carry a download link, dropping the <th> header row and the
  advertisement row. downloadvolumefactor maps by a :contains case key:
  `td:contains("Freeleech")` -> dvf 0 for row 0 (its tag cell contains "Freeleech"),
  the "*" catch-all -> dvf 1 for row 1. Sizes 1024-based (1 GB = 1073741824,
  700 MB = 734003200); peers = seeders + leechers.
