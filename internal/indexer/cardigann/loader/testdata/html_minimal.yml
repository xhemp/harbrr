---
id: html_minimal
name: HTML Minimal
description: "A minimal valid HTML definition fixture."
language: en-US
type: private
encoding: UTF-8
links:
  - https://example.invalid/

caps:
  categorymappings:
    - {id: 1, cat: Movies, desc: "Movies"}
    - {id: "tv2", cat: TV, desc: "TV"}
  modes:
    search: [q]
    tv-search: [q, season, ep]

settings:
  - name: username
    type: text
    label: Username
  - name: timeout
    type: text
    label: Timeout seconds
    default: 30
  - name: freeleech
    type: checkbox
    label: Freeleech only
    default: false
  - name: prefix
    type: text
    label: Prefix
    default: "rel"

login:
  method: form
  path: /login.php
  form: form#login
  inputs:
    username: "{{ .Config.username }}"
    keeplogged: 1
  error:
    - selector: span.error
  test:
    path: /index.php
    selector: a[href*="logout"]

search:
  path: /browse.php
  inputs:
    q: "{{ .Keywords }}"
  rows:
    selector: table.results > tbody > tr
    filters:
      - name: andmatch
  fields:
    title:
      selector: a.title
    category:
      selector: a.cat
      attribute: href
      filters:
        - name: querystring
          args: cat
    download:
      selector: a.dl
      attribute: href
    size:
      selector: td.size
    seeders:
      selector: td.seeders
      filters:
        - name: replace
          args: ["one", "1"]
