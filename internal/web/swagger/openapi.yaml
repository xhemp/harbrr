  /api/cache/stats:
    get:
      summary: Search-results cache statistics
      description: >
        Returns the cache's durable figures (entry count, total hits, approximate
        size, and the oldest/newest/last-used timestamps) plus the cumulative hit
        ratio. hitRatio derives from hit/miss counters that are persisted across
        restarts. When caching is disabled the response is
        {"enabled": false} with no figures.
      operationId: cacheStats
      tags: [Cache]
      security: [{ session: [] }, { apiKey: [] }]
      responses:
        "200":
          description: the cache statistics (or a disabled marker)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CacheStats" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/cache/flush:
    post:
      summary: Flush the search-results cache
      description: >
        Deletes every cache entry and returns the count purged. The cumulative
        hit/miss counters are not reset. When caching is disabled the response is
        {"flushed": 0}.
      operationId: cacheFlush
      tags: [Cache]
      security: [{ session: [] }, { apiKey: [] }]
      responses:
        "200":
          description: the number of entries flushed
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CacheFlushResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/cache/config:
    get:
      summary: Get the search-results cache configuration
      description: >
        Returns the live, runtime-tunable cache config (enabled flag, TTL tiers, thin
        threshold, refresh-ahead percentage). Durations are Go duration strings. With
        no cache wired the response is a disabled, zero-valued config.
      operationId: cacheConfigGet
      tags: [Cache]
      security: [{ session: [] }, { apiKey: [] }]
      responses:
        "200":
          description: the live cache configuration
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CacheConfig" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    put:
      summary: Update the search-results cache configuration
      description: >
        Partially updates the cache config: provided fields are overlaid onto the
        current config, validated, persisted (so they survive a restart), and applied
        immediately without a restart. Omitted fields are left unchanged. Invalid
        durations or out-of-range values answer 400 and leave the config untouched.
      operationId: cacheConfigPut
      tags: [Cache]
      security: [{ session: [] }, { apiKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CacheConfigUpdate" }
      responses:
        "200":
          description: the updated cache configuration
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CacheConfig" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503":
          description: the search cache is not available (no cache wired)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/config/log-level:
    get:
      summary: Get the runtime log level
      description: >
        Returns the effective process-wide log level — the live value (a persisted
        override if set, else the config-file/env/flag seed) that every subsystem honors.
      operationId: getLogLevel
      tags: [System]
      security: [{ session: [] }, { apiKey: [] }]
      responses:
        "200":
          description: the effective log level
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LogLevel" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503":
          description: log level control is unavailable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
    put:
      summary: Set the runtime log level
      description: >
        Persists the new level, then applies it to the whole running process (no
        restart) — so a write failure leaves the running level untouched rather than
        desynchronizing runtime and stored state. A stored value overrides the
        config-file/env/flag seed on the next start. An unknown level answers 400 and
        changes nothing.
      operationId: putLogLevel
      tags: [System]
      security: [{ session: [] }, { apiKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LogLevel" }
      responses:
        "200":
          description: the applied log level
          content:
            application/json:
              schema: { $ref: "#/components/schemas/LogLevel" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503":
          description: log level control is unavailable
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/logs/frontend:
    post:
      summary: Relay a web-UI toast into the daemon log
      description: >
        harbrr is single-user self-hosted software — the daemon's own log is THE log.
        Many error/warning toasts describe client-only events (a fetch that never
        reached the server, a client-side validation rejection) the server never
        otherwise observes, so the web UI ships them here to land in that one log. The
        content is opaque: never parsed, expanded, or echoed back — just written as a
        single log entry at the given level.
      operationId: postFrontendLog
      tags: [System]
      security: [{ session: [] }, { apiKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                level:
                  type: string
                  enum: [error, warn, info]
                  description: the zerolog level the entry is written at
                message:
                  type: string
                  maxLength: 1024
                  description: short human-readable summary (the toast text)
                context:
                  type: string
                  maxLength: 4096
                  description: optional extra detail — an error's message, never a whole response body
              required: [level, message]
      responses:
        "204": { description: logged }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/server-info:
    get:
      summary: Get the server's effective listening port
      description: >
        Returns the live, configured listening port (not anything derived from the
        inbound request), so the frontend can flag app-sync connections whose stored
        HarbrrURL was baked in against a since-changed port.
      operationId: getServerInfo
      tags: [System]
      security: [{ session: [] }, { apiKey: [] }]
      responses:
        "200":
          description: the effective server info
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ServerInfo" }
        "401": { $ref: "#/components/responses/Unauthorized" }

components:
  securitySchemes:
    session:
      type: apiKey
      in: cookie
      name: harbrr_session
    apiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: >
        A bearer credential — send over HTTPS only; it must never traverse a
        cleartext link. Terminate TLS at harbrr or a trusted reverse proxy.
  responses:
    BadRequest:
      description: invalid request
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Unauthorized:
      description: authentication required or failed
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    Conflict:
      description: conflicting state
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: resource not found
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
  schemas:
    Error:
      type: object
      properties:
        error: { type: string, description: human-readable message }
        code:
          type: string
          description: >
            machine-readable code clients can branch on — one of: bad_request,
            invalid, unauthorized, invalid_credentials, invalid_api_key, forbidden,
            not_found, conflict, already_setup, not_implemented, internal.
      required: [error, code]
    ReservedSettings:
      type: object
      description: >
        Optional reserved keys the engine understands when present in an indexer's
        free-form settings map (alongside the definition's own settings). All are
        optional; documented here because they are not part of any single
        definition's schema. proxy_url and cookie are secrets (stored encrypted,
        never echoed — they read back as the <redacted> sentinel).
      properties:
        proxy_type:
          type: string
          enum: [http, https, socks5, socks5h]
          description: route this indexer's traffic through a proxy (socks4 is not supported)
        proxy_url: { type: string, description: "proxy URL; may embed user:pass (secret)" }
        timeout: { type: string, description: "per-request timeout as a Go duration, e.g. 30s" }
        solver_type:
          type: string
          enum: [manual_cookie, flaresolverr]
          description: anti-bot solver (manual_cookie replays the encrypted cookie setting)
        flaresolverr_url: { type: string, description: "FlareSolverr base URL (when solver_type=flaresolverr)" }
        flaresolverr_max_timeout: { type: string, description: "FlareSolverr maxTimeout in seconds (optional)" }
    Credentials:
      type: object
      properties:
        username: { type: string }
        password: { type: string }
      required: [username, password]
    ChangePassword:
      type: object
      properties:
        currentPassword: { type: string }
        newPassword: { type: string }
      required: [currentPassword, newPassword]
    DefinitionSummary:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        type: { type: string }
        language: { type: string }
      required: [id, name]
    SettingField:
      type: object
      description: >
        One configurable field in a definition's settings schema. secret marks a
        credential supplied by the operator, stored encrypted and never echoed back.
      properties:
        name: { type: string }
        label: { type: string }
        type: { type: string, description: "text | password | checkbox | select | multi-select | info*" }
        default: { type: string }
        options:
          type: object
          additionalProperties: { type: string }
        secret: { type: boolean }
      required: [name, type, secret]
    DefinitionDetail:
      allOf:
        - { $ref: "#/components/schemas/DefinitionSummary" }
        - type: object
          properties:
            settings:
              type: array
              items: { $ref: "#/components/schemas/SettingField" }
            caps: { $ref: "#/components/schemas/Capabilities" }
          required: [settings, caps]
    ApiKey:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        createdAt: { type: string, format: date-time }
        lastUsedAt: { type: string, format: date-time }
      required: [id, name, createdAt]
    MintedApiKey:
      type: object
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        key: { type: string, description: "the plaintext key, shown once" }
        createdAt: { type: string, format: date-time }
      required: [id, name, key, createdAt]
    Setting:
      type: object
      properties:
        name: { type: string }
        value: { type: string, description: secret values are the <redacted> sentinel }
        secret: { type: boolean }
      required: [name, value, secret]
    Instance:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: |
            the numeric instance id — the handle the app-sync ledger
            (ConnectionIndexer.instanceId) and SelectIndexers.instanceIds speak
        slug: { type: string }
        definitionId: { type: string }
        name: { type: string }
        baseUrl: { type: string }
        enabled: { type: boolean }
        protocol: { type: string, enum: [torrent, usenet], description: "acquisition protocol, derived from the definition" }
        proxyId: { type: integer, format: int64, nullable: true, description: "referenced global proxy resource, or null" }
        solverId: { type: integer, format: int64, nullable: true, description: "referenced global solver resource, or null" }
        freeleech: { type: boolean, description: "the freeleech-only checkbox's canonical state" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, slug, definitionId, name, enabled, protocol, freeleech, createdAt, updatedAt]
    IndexerStats:
      type: object
      description: >
        Per-indexer Prowlarr-style stats: durable query/grab/latency counters plus the
        failure tally folded in from the health events. queries counts searches that
        reached the tracker (a cache hit bypasses the counted path), so avgResponseMs
        reflects real upstream latency. lastQueryAt/lastFailureAt are absent when never
        observed.
      properties:
        slug: { type: string }
        queries: { type: integer, format: int64 }
        grabs: { type: integer, format: int64 }
        avgResponseMs: { type: integer, format: int64 }
        failures:
          type: object
          properties:
            authFailure: { type: integer, format: int64 }
            rateLimited: { type: integer, format: int64 }
            parseError: { type: integer, format: int64 }
            antiBot: { type: integer, format: int64 }
            transport: { type: integer, format: int64 }
          required: [authFailure, rateLimited, parseError, antiBot, transport]
        lastQueryAt: { type: string, format: date-time }
        lastFailureAt: { type: string, format: date-time }
      required: [slug, queries, grabs, avgResponseMs, failures]
    FleetStatus:
      type: object
      description: >
        Fleet-wide indexer health roll-up: healthy/unhealthy counts plus each
        configured indexer's derived status and most recent health event, sorted
        by slug.
      properties:
        healthy: { type: integer }
        unhealthy: { type: integer }
        indexers:
          type: array
          items:
            type: object
            required: [slug, status]
            properties:
              slug: { type: string }
              status: { type: string, enum: [healthy, unhealthy] }
              lastEvent:
                type: object
                required: [kind, occurred_at]
                properties:
                  kind:
                    type: string
                    enum: [auth_failure, rate_limited, parse_error, anti_bot, transport]
                  detail: { type: string }
                  occurred_at: { type: string, format: date-time }
      required: [healthy, unhealthy, indexers]
    InstanceDetail:
      allOf:
        - { $ref: "#/components/schemas/Instance" }
        - type: object
          properties:
            settings:
              type: array
              items: { $ref: "#/components/schemas/Setting" }
          required: [settings]
    AddIndexer:
      type: object
      properties:
        slug: { type: string, description: defaults to definitionId when omitted }
        definitionId: { type: string }
        name: { type: string }
        baseUrl: { type: string }
        settings:
          type: object
          additionalProperties: { type: string }
          description: >
            definition setting name -> value. May also carry the reserved engine
            keys (see ReservedSettings): proxy_type/proxy_url, timeout,
            solver_type/flaresolverr_url. Secret values are stored encrypted.
        proxyId: { type: integer, format: int64, nullable: true, description: reference a global proxy resource (nil = none) }
        solverId: { type: integer, format: int64, nullable: true, description: reference a global solver resource (nil = none) }
      required: [definitionId]
    UpdateIndexer:
      type: object
      properties:
        name: { type: string }
        baseUrl: { type: string }
        settings:
          type: object
          additionalProperties: { type: string }
          description: >
            merged into the stored settings (see ReservedSettings for the reserved
            engine keys). PATCH the <redacted> sentinel to keep an existing secret;
            send new plaintext to rotate it.
        proxyId: { type: integer, format: int64, nullable: true, description: "the global proxy reference; applied verbatim (null clears it)" }
        solverId: { type: integer, format: int64, nullable: true, description: "the global solver reference; applied verbatim (null clears it)" }
    Capabilities:
      type: object
      properties:
        modes:
          type: object
          additionalProperties: { type: array, items: { type: string } }
          description: search mode -> supported query params
        allowRawSearch: { type: boolean }
        allowTVSearchIMDB: { type: boolean }
        categories:
          type: array
          items:
            type: object
            required: [id, name, isCustom, isParent]
            properties:
              id: { type: integer }
              name: { type: string }
              isCustom: { type: boolean }
              isParent: { type: boolean }
              parent: { type: string }
        defaultCategories: { type: array, items: { type: string } }
        limits:
          type: object
          required: [default, max]
          properties:
            default: { type: integer }
            max: { type: integer }
      required: [modes, allowRawSearch, allowTVSearchIMDB, categories, limits]
    SearchResults:
      type: object
      description: >
        A page of search results plus paging metadata (qui-shaped envelope). `total`
        is the full match count after dedupe/filter but before the page slice, so it
        can exceed the number of results returned; `hasMore` is true when results
        beyond this page exist; `limit`/`offset` are the resolved page window. Deep
        server-side multi-page upstream fetching is not yet implemented, so `total`
        reflects the single engine fetch that backs every page of one query.
      properties:
        results:
          type: array
          items: { $ref: "#/components/schemas/Release" }
        total:
          type: integer
          description: full match count before the page slice
        hasMore:
          type: boolean
          description: whether results beyond this page exist (offset + page length < total)
        limit:
          type: integer
          description: resolved page size (clamped to [1,100])
        offset:
          type: integer
          description: resolved page offset
      required: [results, total, hasMore, limit, offset]
    Release:
      type: object
      description: >
        A normalized release — the same shape the Torznab feed serializes. For a
        resolver-needing indexer, `link` is the opaque /dl proxy URL (the passkey is
        sealed inside, never exposed here). Zero values for size/seeders/leechers/
        peers and the volume factors are meaningful and always present.
      properties:
        title: { type: string }
        link: { type: string }
        magnet: { type: string }
        infohash: { type: string }
        size: { type: integer, format: int64 }
        categories: { type: array, items: { type: integer } }
        seeders: { type: integer, format: int64 }
        leechers: { type: integer, format: int64 }
        peers: { type: integer, format: int64 }
        grabs: { type: integer, format: int64 }
        files: { type: integer, format: int64 }
        publishDate: { type: string, format: date-time }
        downloadVolumeFactor: { type: number }
        uploadVolumeFactor: { type: number }
        imdbid: { type: string }
        tmdbid: { type: integer, format: int64 }
        tvdbid: { type: integer, format: int64 }
      required: [title]
    TestResult:
      type: object
      description: >
        The outcome of a test action. ok=false carries a credential-scrubbed error
        message; the HTTP status is 200 even on a credential/connectivity failure.
      properties:
        ok: { type: boolean }
        error: { type: string }
      required: [ok]
    AppConnection:
      type: object
      description: >
        An *arr/qui app harbrr syncs its indexers into. The app's API key (apiKey) is
        never echoed — it reads back as the <redacted> sentinel.
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        kind: { type: string, enum: [sonarr, radarr, lidarr, readarr, whisparr, qui] }
        baseUrl: { type: string, description: the app's own API base URL }
        harbrrUrl: { type: string, description: the base URL this app uses to reach harbrr's feed }
        apiKey: { type: string, description: "the app's API key, redacted (<redacted>)" }
        enabled: { type: boolean }
        syncLevel:
          type: string
          enum: [full, add_update]
          description: "full = add+update+remove orphans; add_update = add+update, never delete"
        indexScope:
          type: string
          enum: [all, selected]
          description: which harbrr indexers this connection mirrors
        freeleechMode:
          type: string
          enum: [honor, bypass]
          description: >
            which feed variant is pushed: honor = the standard feed (the indexer's
            freeleech setting is respected); bypass = the /full variant (full catalog,
            for cross-seed). Defaults by kind (qui = bypass; *arrs = honor).
        priority: { type: integer }
        syncProfileId:
          type: integer
          format: int64
          nullable: true
          description: >
            the sync profile this connection uses, or null for none (default behavior).
            ON DELETE SET NULL — deleting the profile drops the reference. Never set for
            qui (sync profiles do not apply to it); a profile with a non-empty category
            set must overlap the app's content range (the attach-time overlap guard).
        lastSyncAt: { type: string, format: date-time }
        lastSyncStatus: { type: string, description: "ok | partial | error | skipped" }
        lastSyncError: { type: string, description: scrubbed summary of the last failure }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, kind, baseUrl, harbrrUrl, enabled, syncLevel, indexScope, freeleechMode, priority, createdAt, updatedAt]
    CreateConnection:
      type: object
      properties:
        name: { type: string }
        kind: { type: string, enum: [sonarr, radarr, lidarr, readarr, whisparr, qui] }
        baseUrl: { type: string }
        apiKey: { type: string, description: the app's API key (stored encrypted) }
        harbrrUrl: { type: string }
        syncLevel: { type: string, enum: [full, add_update], default: full }
        indexScope: { type: string, enum: [all, selected], default: all }
        freeleechMode: { type: string, enum: [honor, bypass], description: "defaults by kind (qui = bypass; *arrs = honor)" }
        priority: { type: integer, default: 25 }
        syncProfileId:
          type: integer
          format: int64
          nullable: true
          description: "optional sync profile reference; must exist, must not be set for qui, and a non-empty category set must overlap the app's content range (else 400)"
      required: [name, kind, baseUrl, apiKey, harbrrUrl]
    UpdateConnection:
      type: object
      description: >
        A partial update; omitted fields are unchanged. apiKey, when present, rotates
        the stored app credential.
      properties:
        name: { type: string }
        baseUrl: { type: string }
        apiKey: { type: string }
        harbrrUrl: { type: string }
        syncLevel: { type: string, enum: [full, add_update] }
        indexScope: { type: string, enum: [all, selected] }
        freeleechMode: { type: string, enum: [honor, bypass] }
        priority: { type: integer }
        syncProfileId:
          type: integer
          format: int64
          nullable: true
          description: >
            tri-state: omit to leave unchanged, null to clear, an id to set it (validated
            as on create). Applied verbatim once validated.
    AnnounceConnection:
      type: object
      description: >
        A cross-seed tool harbrr pushes newly-seen releases to. The tool's API key
        (apiKey) is never echoed — it reads back as the <redacted> sentinel.
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        kind: { type: string, enum: [qui, crossseed-v6] }
        baseUrl: { type: string, description: the tool's own API base URL }
        harbrrUrl: { type: string, description: "the base URL the tool uses to reach harbrr's /dl link (cross-seed v6)" }
        apiKey: { type: string, description: "the tool's API key, redacted (<redacted>)" }
        enabled: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, kind, baseUrl, enabled, createdAt, updatedAt]
    CreateAnnounceConnection:
      type: object
      properties:
        name: { type: string }
        kind: { type: string, enum: [qui, crossseed-v6] }
        baseUrl: { type: string }
        apiKey: { type: string, description: the tool's API key (stored encrypted) }
        harbrrUrl: { type: string, description: "the base URL the tool uses to reach harbrr's /dl link (both kinds fetch it)" }
      required: [name, kind, baseUrl, apiKey, harbrrUrl]
    Notification:
      type: object
      description: >
        A notification target harbrr fires operational events at. The destination URL
        (url) is never echoed — it reads back as the <redacted> sentinel.
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        type: { type: string, enum: [webhook, discord] }
        url: { type: string, description: "the destination URL, redacted (<redacted>)" }
        enabled: { type: boolean }
        onHealthFailure: { type: boolean, description: fire on a classified indexer health failure }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, type, url, enabled, onHealthFailure, createdAt, updatedAt]
    CreateNotification:
      type: object
      properties:
        name: { type: string }
        type: { type: string, enum: [webhook, discord] }
        url: { type: string, description: the destination URL (stored encrypted) }
        onHealthFailure: { type: boolean, description: "fire on an indexer health failure (default true)" }
      required: [name, type, url]
    UpdateNotification:
      type: object
      description: a partial update; omitted fields are left unchanged
      properties:
        name: { type: string }
        url: { type: string, description: rotates the destination (stored encrypted) }
        onHealthFailure: { type: boolean }
    Proxy:
      type: object
      description: >
        A global, reusable proxy an indexer references by id. host/port/username are
        plain (never masked); the password is a write-only secret and is never
        echoed back in a response.
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        type: { type: string, enum: [http, https, socks5, socks5h] }
        host: { type: string }
        port: { type: integer }
        username: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, type, host, port, username, createdAt, updatedAt]
    CreateProxy:
      type: object
      properties:
        name: { type: string }
        type: { type: string, enum: [http, https, socks5, socks5h] }
        host: { type: string }
        port: { type: integer }
        username: { type: string }
        password: { type: string, description: "optional; stored encrypted" }
      required: [name, type, host, port]
    UpdateProxy:
      type: object
      description: a partial update; omitted fields are left unchanged
      properties:
        name: { type: string }
        type: { type: string, enum: [http, https, socks5, socks5h] }
        host: { type: string }
        port: { type: integer }
        username: { type: string }
        password: { type: string, description: "rotates the password (stored encrypted); omitted keeps the stored one" }
    Solver:
      type: object
      description: >
        A global, reusable anti-bot solver (FlareSolverr) an indexer references by id.
        The endpoint URL (url) is never echoed — it reads back as the <redacted> sentinel.
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        type: { type: string, enum: [flaresolverr] }
        url: { type: string, description: "the endpoint URL, redacted (<redacted>)" }
        maxTimeout: { type: integer, description: "per-solve budget in seconds (0 = the solver default)" }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, type, url, maxTimeout, createdAt, updatedAt]
    CreateSolver:
      type: object
      properties:
        name: { type: string }
        type: { type: string, enum: [flaresolverr], description: "defaults to flaresolverr" }
        url: { type: string, description: the endpoint URL (stored encrypted) }
        maxTimeout: { type: integer, description: "per-solve budget in seconds (0 = default)" }
      required: [name, url]
    UpdateSolver:
      type: object
      description: a partial update; omitted fields are left unchanged
      properties:
        name: { type: string }
        type: { type: string, enum: [flaresolverr] }
        url: { type: string, description: rotates the endpoint (stored encrypted) }
        maxTimeout: { type: integer }
    SyncProfile:
      type: object
      description: >
        A named, reusable set of app-sync overrides a connection references by id (the
        Prowlarr AppProfile equivalent). Holds no secrets.
      properties:
        id: { type: integer, format: int64 }
        name: { type: string }
        categories:
          type: array
          items: { type: integer }
          description: >
            Newznab category ids this profile narrows a connection to (deduped and
            sorted). Empty means no narrowing (the full category set is pushed). A
            profile only narrows within the app's own content type, never beyond it.
        minSeeders: { type: integer, description: "pushed Torznab minimum-seeders floor (0 = the app default, not pushed)" }
        enableRss: { type: boolean }
        enableAutomaticSearch: { type: boolean }
        enableInteractiveSearch: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
      required: [id, name, categories, minSeeders, enableRss, enableAutomaticSearch, enableInteractiveSearch, createdAt, updatedAt]
    CreateSyncProfile:
      type: object
      properties:
        name: { type: string }
        categories:
          type: array
          items: { type: integer }
          description: "Newznab category ids to narrow to (0 < id < 1000000); empty means no narrowing"
        minSeeders: { type: integer, description: "minimum-seeders floor (>= 0); 0 = the app default" }
        enableRss: { type: boolean, default: true }
        enableAutomaticSearch: { type: boolean, default: true }
        enableInteractiveSearch: { type: boolean, default: true }
      required: [name]
    UpdateSyncProfile:
      type: object
      description: >
        A partial update; omitted fields are left unchanged. A present-but-empty
        categories array clears the category set (revert to full-category behavior).
      properties:
        name: { type: string }
        categories: { type: array, items: { type: integer } }
        minSeeders: { type: integer }
        enableRss: { type: boolean }
        enableAutomaticSearch: { type: boolean }
        enableInteractiveSearch: { type: boolean }
    CrossSeedSnippet:
      type: object
      description: a copy-paste cross-seed v6 config.js torznab entry for one indexer
      properties:
        indexer: { type: string, description: the indexer slug }
        feedUrl: { type: string, description: the freeleech-bypass /full Torznab feed URL (no apikey) }
        configJs: { type: string, description: "the torznab array entry for config.js, with an apikey placeholder" }
      required: [indexer, feedUrl, configJs]
    ConnectionIndexer:
      type: object
      description: one row of a connection's per-indexer sync ledger
      properties:
        instanceId: { type: integer, format: int64 }
        remoteId: { type: string, description: the id the app assigned the pushed indexer }
        selected: { type: boolean }
        lastPushedAt: { type: string, format: date-time }
        lastPushStatus: { type: string, description: "ok | error" }
        lastPushError: { type: string, description: scrubbed error from the last push }
      required: [instanceId, selected]
    ConnectionStatus:
      allOf:
        - { $ref: "#/components/schemas/AppConnection" }
        - type: object
          properties:
            indexers:
              type: array
              items: { $ref: "#/components/schemas/ConnectionIndexer" }
          required: [indexers]
    SyncResult:
      type: object
      properties:
        slug: { type: string }
        action: { type: string, description: "created | updated | noop | deleted | failed" }
        error: { type: string, description: scrubbed error when action=failed }
      required: [slug, action]
    SyncReport:
      type: object
      properties:
        status: { type: string, description: "ok | partial | error | skipped" }
        results:
          type: array
          items: { $ref: "#/components/schemas/SyncResult" }
      required: [status, results]
    ConnectionSyncResult:
      type: object
      properties:
        connectionId: { type: integer, format: int64 }
        name: { type: string }
        report: { $ref: "#/components/schemas/SyncReport" }
        error: { type: string, description: scrubbed error when this connection failed to sync }
      required: [connectionId, name, report]
    SelectIndexers:
      type: object
      properties:
        instanceIds:
          type: array
          items: { type: integer, format: int64 }
          description: the indexer instance ids to select; all others are cleared
      required: [instanceIds]
    CacheStats:
      type: object
      description: >
        Search-results cache statistics. When enabled is false, caching is off and
        the remaining figures are absent/zero.
      properties:
        enabled: { type: boolean, description: whether caching is configured }
        entries: { type: integer, format: int64, description: number of cached search results }
        totalHits: { type: integer, format: int64, description: durable sum of per-entry hit counts }
        hits:
          type: integer
          format: int64
          description: >
            Global cumulative cache hits (the aggregate of the per-indexer byIndexer
            rows). Persisted across restarts.
        misses:
          type: integer
          format: int64
          description: >
            Global cumulative cache misses (the aggregate of the per-indexer byIndexer
            rows). Persisted across restarts.
        hitRatio:
          type: number
          format: double
          description: >
            hits / (hits + misses), cumulative. The underlying hit/miss counters are
            persisted across restarts.
        approxSizeBytes: { type: integer, format: int64, description: approximate total size of cached payloads }
        oldestCachedAt:
          type: integer
          format: int64
          nullable: true
          description: Unix seconds of the oldest entry's cached_at, or null when empty
        newestCachedAt:
          type: integer
          format: int64
          nullable: true
          description: Unix seconds of the newest entry's cached_at, or null when empty
        lastUsedAt:
          type: integer
          format: int64
          nullable: true
          description: Unix seconds of the most-recently-used entry, or null when empty
        trackerHitsSaved:
          type: integer
          format: int64
          description: >
            Cumulative tracker requests served from cache (durable sum of per-entry hit
            counts) — the headline kind-to-trackers metric. Equal to totalHits.
        breakerSuppressed:
          type: integer
          format: int64
          description: >
            Cumulative count of misses short-circuited by the negative-result circuit
            breaker (extra tracker requests spared a failing tracker). Persisted across
            restarts.
        byIndexer:
          type: array
          description: Per-indexer cache breakdown, ordered by instance id.
          items: { $ref: "#/components/schemas/CacheIndexerStats" }
      required: [enabled]
    CacheIndexerStats:
      type: object
      description: One indexer's cache observability figures.
      properties:
        instanceId: { type: integer, format: int64 }
        slug: { type: string, description: the indexer's configured slug (empty if unresolved) }
        name: { type: string, description: the indexer's display name (empty if unresolved) }
        entries: { type: integer, format: int64, description: durable number of cached entries for this indexer }
        hitsSaved: { type: integer, format: int64, description: durable tracker requests this indexer served from cache }
        hits: { type: integer, format: int64, description: cumulative cache hits for this indexer (persisted across restarts) }
        misses: { type: integer, format: int64, description: cumulative cache misses for this indexer (persisted across restarts) }
        hitRatio: { type: number, format: double, description: cumulative hits / (hits + misses) for this indexer }
        approxSizeBytes: { type: integer, format: int64, description: approximate cached payload size for this indexer }
        breakerSuppressed: { type: integer, format: int64, description: misses short-circuited by the breaker for this indexer }
        breakerOpenUntil:
          type: integer
          format: int64
          nullable: true
          description: Unix seconds the breaker reopens this indexer to live traffic, or null when closed
      required: [instanceId, entries, hitsSaved, hits, misses, hitRatio, approxSizeBytes, breakerSuppressed]
    CacheFlushResult:
      type: object
      properties:
        flushed: { type: integer, format: int64, description: number of entries purged (0 when caching is disabled) }
      required: [flushed]

    LogLevel:
      type: object
      description: The process-wide log level (get returns the effective value; put sets it).
      properties:
        level:
          type: string
          enum: [trace, debug, info, warn, error]
          description: the log level applied across every subsystem
      required: [level]

    ServerInfo:
      type: object
      description: The server's live effective listening configuration.
      properties:
        port:
          type: integer
          description: the configured listening port harbrr is currently bound to
      required: [port]

    CacheConfig:
      type: object
      description: The live, runtime-tunable search-results cache configuration.
      properties:
        enabled: { type: boolean, description: whether caching is currently on (a runtime toggle) }
        rssTtl: { type: string, description: 'TTL for an empty/RSS poll (Go duration, e.g. "5m0s")' }
        keywordTtl: { type: string, description: TTL for a keyword search (Go duration) }
        thinTtl: { type: string, description: short TTL clamp for a thin (few-result) response (Go duration) }
        thinThreshold: { type: integer, description: result count at or below which the thin clamp applies }
        refreshAheadPct: { type: integer, description: 'percent of a TTL after which a live hit fires one background refresh (0 disables)' }
        negativeTtl: { type: string, description: 'negative-result circuit-breaker window (Go duration, e.g. "1m0s"); "0s" disables the breaker' }
        cleanupInterval: { type: string, description: 'how often expired entries are reaped (Go duration >= 1s, e.g. "1h0m0s"); the cleanup loop re-reads it live' }
      required: [enabled, rssTtl, keywordTtl, thinTtl, thinThreshold, refreshAheadPct, negativeTtl, cleanupInterval]

    CacheConfigUpdate:
      type: object
      description: >
        A partial cache-config update; every field is optional and an omitted field
        leaves that knob unchanged. Durations are Go duration strings.
      properties:
        enabled: { type: boolean }
        rssTtl: { type: string }
        keywordTtl: { type: string }
        thinTtl: { type: string }
        thinThreshold: { type: integer }
        refreshAheadPct: { type: integer }
        negativeTtl: { type: string }
        cleanupInterval: { type: string }
