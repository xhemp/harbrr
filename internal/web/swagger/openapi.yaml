openapi: 3.1.0
info:
  title: seekbrr management API
  version: 0.0.0
  description: >
    seekbrr's own management API (configuration of indexers, secrets, and
    download clients). This is distinct from the *arr-facing Torznab/Newznab
    XML contract served by internal/torznab; the two evolve independently
    (see docs/architecture.md). Hand-authored, embedded via //go:embed, and
    guarded by a drift test (make test-openapi).
  license:
    name: GPL-2.0-or-later
    url: https://www.gnu.org/licenses/gpl-2.0.html
paths:
  /healthz:
    get:
      summary: Liveness probe
      operationId: getHealthz
      responses:
        "200":
          description: service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                required:
                  - status
