        - { name: t, in: query, required: false, schema: { type: string }, description: "function: caps | search | tvsearch | movie | music | book (defaults to search)" }
        - { name: q, in: query, required: false, schema: { type: string }, description: free-text query }
        - { name: cat, in: query, required: false, schema: { type: string }, description: comma-separated newznab category ids }
        - { name: imdbid, in: query, required: false, schema: { type: string } }
        - { name: tmdbid, in: query, required: false, schema: { type: string } }
