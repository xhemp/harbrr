openapi: 3.1.0
info:
  title: harbrr management API
  version: 0.1.0
  description: >
    harbrr's HTTP surface: the management API (first-run setup, authentication,
    API-key management, indexer and app-sync configuration) plus the entry points of
    the *arr-facing Torznab feed. The Torznab wire contract itself — the XML body
    shapes — is defined by Jackett/Newznab and served by internal/torznab; here we
    document only its HTTP routes, parameters, and content types (see
    docs/architecture.md). Hand-authored, embedded via //go:embed, and guarded by a
    drift test that asserts the spec matches the mounted routes (make test-openapi).

    Authentication: the management API uses a cookie session (after login) or the
    X-API-Key header; the Torznab feed authenticates with an apikey (or passkey)
    query parameter, as *arr clients expect. CSRF: a cookie-authenticated mutating
    request (POST/PUT/PATCH/DELETE) must echo the session's CSRF token in an
    X-CSRF-Token header — the token is minted at login and handed to the client via
    the non-HttpOnly harbrr_csrf cookie and GET /api/auth/me; a missing or wrong
    token is 403. X-API-Key and auth-disabled callers are exempt (see
    docs/security.md).
  license:
    name: GPL-2.0-or-later
    url: https://www.gnu.org/licenses/gpl-2.0.html

tags:
  - name: Torznab Feed
    description: >
      The *arr-facing Torznab endpoints Sonarr/Radarr/Prowlarr point at: capabilities,
      search, and the grab-time download proxy. Authenticated by an apikey/passkey
      query parameter; responses are Torznab XML (or a torrent file for /dl).
  - name: Indexers
    description: Configure, test, search, and inspect the tracker instances harbrr serves.
  - name: Indexer Definitions
    description: The Cardigann definition catalog (vendored + native) available to configure.
  - name: App Connections
    description: Sonarr/Radarr/Lidarr/Readarr/Whisparr/qui apps harbrr pushes its indexers into (app-sync).
  - name: Authentication
    description: First-run setup, login/logout, identity, and password change.
  - name: API Keys
    description: Mint and revoke the keys that authorize programmatic and feed access.
  - name: System
    description: Liveness and other operational endpoints.
  - name: Cache
    description: >
      The search-results cache backing the Torznab feed and JSON search. Inspect
      hit-ratio and size, or flush every entry. When caching is disabled the
      endpoints report a disabled state rather than 404.
  - name: Notifications
    description: >
      Notification targets harbrr fires operational events at (an indexer health
      failure today) via a generic webhook or a Discord webhook. The destination URL
      is redacted.
  - name: Proxies
    description: >
      Global, reusable proxy resources an indexer references by id. The URL (which may
      embed user:pass) is stored encrypted and reads back redacted.
  - name: Solvers
    description: >
      Global, reusable anti-bot-solver resources (FlareSolverr) an indexer references by
      id. The endpoint URL is stored encrypted and reads back redacted. The manual-cookie
      solver stays per-indexer and is not modelled here.
  - name: Sync profiles
    description: >
      Named, reusable app-sync overrides a connection references by id (the Prowlarr
      AppProfile equivalent): a category subset (narrowing within the app's own content
      type), a pushed minimum-seeders floor, and the RSS/automatic/interactive-search
      toggles. No secrets.

paths:
  /healthz:
    get:
      summary: Liveness probe
      operationId: getHealthz
      tags: [System]
      responses:
        "200":
          description: service is healthy; also carries the running build version and commit
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  version:
                    type: string
                    description: the running harbrr build version
                  commit:
                    type: string
                    description: the git commit the build was cut from
                required: [status, version, commit]

  /api/auth/setup:
    get:
      summary: First-run setup status
      operationId: getSetupStatus
      tags: [Authentication]
      responses:
        "200":
          description: whether the admin account exists
          content:
            application/json:
              schema:
                type: object
                properties:
                  setupComplete:
                    type: boolean
                required: [setupComplete]
    post:
      summary: Create the single admin (first run only)
      operationId: postSetup
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Credentials" }
      responses:
        "201":
          description: admin created
          content:
            application/json:
              schema:
                type: object
                properties:
                  username: { type: string }
                required: [username]
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/auth/login:
    post:
      summary: Log in and establish a session
      operationId: login
      tags: [Authentication]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Credentials" }
      responses:
        "204": { description: logged in (session cookie set) }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/auth/logout:
    post:
      summary: Destroy the current session
      operationId: logout
      tags: [Authentication]
      security: [{ session: [] }, { apiKey: [] }]
      responses:
        "204": { description: logged out }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/auth/me:
    get:
      summary: Current authenticated identity
      operationId: me
      tags: [Authentication]
      security: [{ session: [] }, { apiKey: [] }]
      responses:
        "200":
          description: the authenticated identity
          content:
            application/json:
              schema:
                type: object
                properties:
                  username: { type: string }
                  authMethod: { type: string }
                  csrfToken:
                    type: string
                    description: >
                      The session's CSRF token (empty for an apikey/auth-disabled
                      caller). Echo it in the X-CSRF-Token header on cookie-authenticated
                      mutating requests.
                required: [username, authMethod]
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/auth/change-password:
    post:
      summary: Change the admin password
      description: >
        Verifies the current admin password and replaces it (the password is never
        recoverable). The session token is renewed. Operates on the single admin
        account.
      operationId: changePassword
      tags: [Authentication]
      security: [{ session: [] }, { apiKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChangePassword" }
      responses:
        "204": { description: password changed }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/auth/oidc/login:
    get:
      summary: OIDC login (not implemented — deferred to a later phase)
      operationId: oidcLogin
      tags: [Authentication]
      responses:
        "501": { description: OIDC is not implemented yet }

  /api/auth/oidc/callback:
    get:
      summary: OIDC callback (not implemented — deferred to a later phase)
      operationId: oidcCallback
      tags: [Authentication]
      responses:
        "501": { description: OIDC is not implemented yet }

  /api/definitions:
    get:
      summary: List available tracker definitions
      operationId: listDefinitions
      tags: [Indexer Definitions]
      security: [{ session: [] }, { apiKey: [] }]
      responses:
        "200":
          description: the available definitions
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/DefinitionSummary" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/definitions/{id}:
    get:
      summary: Get a definition's settings schema and capabilities
      description: >
        Returns a single definition's ordered settings fields (with a secret flag
        per field, for rendering an add-indexer form) and its capabilities. This is
        the definition schema, not a configured instance — it carries no stored
        secret. Resolves both vendored and native definitions.
      operationId: getDefinition
      tags: [Indexer Definitions]
      security: [{ session: [] }, { apiKey: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: the definition schema
          content:
            application/json:
              schema: { $ref: "#/components/schemas/DefinitionDetail" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/apikeys:
    get:
      summary: List API keys (metadata only)
      operationId: listApiKeys
      tags: [API Keys]
      security: [{ session: [] }, { apiKey: [] }]
      responses:
        "200":
          description: the API keys
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ApiKey" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      summary: Mint a new API key (plaintext shown once)
      operationId: mintApiKey
      tags: [API Keys]
      security: [{ session: [] }, { apiKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
              required: [name]
      responses:
        "201":
          description: the minted key (plaintext returned once)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MintedApiKey" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/apikeys/{id}:
    delete:
      summary: Revoke an API key
      operationId: deleteApiKey
      tags: [API Keys]
      security: [{ session: [] }, { apiKey: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "204": { description: revoked }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/indexers:
    get:
      summary: List configured indexers
      operationId: listIndexers
      tags: [Indexers]
      security: [{ session: [] }, { apiKey: [] }]
      responses:
        "200":
          description: the configured indexers
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/Instance" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      summary: Add a configured indexer
      operationId: addIndexer
      tags: [Indexers]
      security: [{ session: [] }, { apiKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/AddIndexer" }
      responses:
        "201":
          description: the created indexer
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Instance" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/indexers/stats:
    get:
      summary: Get per-indexer stats for all indexers
      description: >
        Returns Prowlarr-style stats for every configured indexer: query/grab counts,
        average response time, failure tallies by kind, and last-query/last-failure
        timestamps.
      operationId: allIndexerStats
      tags: [Indexers]
      security: [{ session: [] }, { apiKey: [] }]
      responses:
        "200":
          description: per-indexer stats for all indexers
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/IndexerStats" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/indexers/status:
    get:
      summary: Get fleet-wide indexer health status
      description: >
        Returns healthy/unhealthy counts across every configured indexer, plus each
        indexer's derived status and most recent health event, sorted by slug.
      operationId: allIndexerStatus
      tags: [Indexers]
      security: [{ session: [] }, { apiKey: [] }]
      responses:
        "200":
          description: fleet-wide indexer status
          content:
            application/json:
              schema: { $ref: "#/components/schemas/FleetStatus" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/indexers/{slug}:
    get:
      summary: Get a configured indexer (settings redacted)
      operationId: getIndexer
      tags: [Indexers]
      security: [{ session: [] }, { apiKey: [] }]
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: the indexer with its settings
          content:
            application/json:
              schema: { $ref: "#/components/schemas/InstanceDetail" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    patch:
      summary: Update an indexer (settings merged; <redacted> keeps the stored value)
      operationId: updateIndexer
      tags: [Indexers]
      security: [{ session: [] }, { apiKey: [] }]
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateIndexer" }
      responses:
        "204": { description: updated }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      summary: Delete a configured indexer
      operationId: deleteIndexer
      tags: [Indexers]
      security: [{ session: [] }, { apiKey: [] }]
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: deleted }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/indexers/{slug}/enable:
    post:
      summary: Enable an indexer
      operationId: enableIndexer
      tags: [Indexers]
      security: [{ session: [] }, { apiKey: [] }]
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: enabled }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/indexers/{slug}/disable:
    post:
      summary: Disable an indexer
      operationId: disableIndexer
      tags: [Indexers]
      security: [{ session: [] }, { apiKey: [] }]
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "204": { description: disabled }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/indexers/{slug}/test:
    post:
      summary: Test an indexer's credentials and connectivity
      description: >
        Validates the configured credentials against a fresh, uncached engine
        (the login probe). A passing test returns ok=true; a credential or
        connectivity failure returns ok=false with a sanitized, secret-free error.
      operationId: testIndexer
      tags: [Indexers]
      security: [{ session: [] }, { apiKey: [] }]
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: test result
          content:
            application/json:
              schema:
                type: object
                required: [ok]
                properties:
                  ok: { type: boolean }
                  error: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/indexers/{slug}/status:
    get:
      summary: Get an indexer's health status
      description: >
        Returns the indexer's derived health (healthy/unhealthy) and its recent
        health events (auth_failure, rate_limited, parse_error, anti_bot, transport). Event
        details are credential-scrubbed before storage, so no secret is surfaced.
      operationId: indexerStatus
      tags: [Indexers]
      security: [{ session: [] }, { apiKey: [] }]
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: indexer health status
          content:
            application/json:
              schema:
                type: object
                required: [slug, status, events]
                properties:
                  slug: { type: string }
                  status: { type: string, enum: [healthy, unhealthy] }
                  events:
                    type: array
                    items:
                      type: object
                      required: [kind, occurred_at]
                      properties:
                        kind:
                          type: string
                          enum: [auth_failure, rate_limited, parse_error, anti_bot, transport]
                        detail: { type: string }
                        occurred_at: { type: string, format: date-time }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/indexers/{slug}/stats:
    get:
      summary: Get an indexer's stats
      description: >
        Returns the indexer's Prowlarr-style stats: query/grab counts, average response
        time, failure tallies by kind (auth_failure, rate_limited, parse_error,
        anti_bot, transport), and last-query/last-failure timestamps.
      operationId: indexerStats
      tags: [Indexers]
      security: [{ session: [] }, { apiKey: [] }]
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: indexer stats
          content:
            application/json:
              schema: { $ref: "#/components/schemas/IndexerStats" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/indexers/{slug}/search:
    get:
      summary: Search a configured indexer (JSON)
      description: >
        Runs a search against the indexer and returns the same releases the
        Torznab feed serves for the same query (the shared pipeline — parity).
        For a resolver-needing indexer each download link is sealed behind the
        /dl proxy, so a passkey never appears in the response.
      operationId: searchIndexer
      tags: [Indexers]
      security: [{ session: [] }, { apiKey: [] }]
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: q, in: query, required: false, schema: { type: string }, description: free-text query }
        - { name: cat, in: query, required: false, schema: { type: string }, description: comma-separated newznab category ids }
        - { name: imdbid, in: query, required: false, schema: { type: string } }
        - { name: tmdbid, in: query, required: false, schema: { type: string } }
        - { name: tvdbid, in: query, required: false, schema: { type: string } }
        - { name: season, in: query, required: false, schema: { type: string } }
        - { name: ep, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer }, description: "page size, clamped to [1,100]" }
        - { name: offset, in: query, required: false, schema: { type: integer } }
      responses:
        "200":
          description: the search results
          content:
            application/json:
              schema: { $ref: "#/components/schemas/SearchResults" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500":
          description: the search failed (a sanitized, secret-free error)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/indexers/{slug}/download/{token}:
    get:
      summary: Download a search result (session-authed)
      description: >
        Resolves and streams a search result's .torrent/.nzb bytes (or 302-redirects a
        magnet), authenticating by session cookie or X-API-Key — the web UI's sibling of
        the feed's apikey-sealed /dl proxy (the UI authenticates by cookie and never
        sends X-API-Key). The token is the opaque, indexer-bound value the JSON search
        response sealed into each resolver-needing release link; the passkey-bearing
        source link is resolved and fetched server-side and never exposed.
      operationId: downloadRelease
      tags: [Indexers]
      security: [{ session: [] }, { apiKey: [] }]
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
        - { name: token, in: path, required: true, schema: { type: string }, description: opaque download token from the search response link }
      responses:
        "200":
          description: the torrent/nzb file bytes
          content:
            application/x-bittorrent:
              schema: { type: string, format: binary }
            application/x-nzb:
              schema: { type: string, format: binary }
        "302":
          description: a resolved magnet link (Location header); no body
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500":
          description: the grab failed (a sanitized, secret-free error)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }
        "503":
          description: the download proxy is not enabled (no token keyring)
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Error" }

  /api/indexers/{slug}/capabilities:
    get:
      summary: Get a configured indexer's search capabilities
      description: >
        Returns the indexer's search modes (with their supported params), the
        advertised category tree, and the page-size limits. The internal
        tracker<->newznab category lookup is not part of the response.
      operationId: indexerCapabilities
      tags: [Indexers]
      security: [{ session: [] }, { apiKey: [] }]
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: the indexer capabilities
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Capabilities" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/indexers/{slug}/crossseed-snippet:
    get:
      summary: Get a cross-seed v6 config.js snippet for an indexer
      description: >
        Returns a copy-paste torznab entry for cross-seed v6's config.js. cross-seed v6
        has no indexer API (file config + restart), so harbrr emits the snippet instead
        of pushing it. The URL is the freeleech-bypass /full variant (cross-seed must see
        the full catalog). The apikey is a placeholder the operator replaces with one of
        their minted harbrr API keys — harbrr stores keys only as hashes and cannot echo
        a usable one.
      operationId: indexerCrossSeedSnippet
      tags: [Indexers]
      security: [{ session: [] }, { apiKey: [] }]
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: the cross-seed v6 config snippet
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CrossSeedSnippet" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/app-connections:
    get:
      summary: List *arr/qui app-sync connections
      operationId: listConnections
      tags: [App Connections]
      security: [{ session: [] }, { apiKey: [] }]
      responses:
        "200":
          description: the configured connections (app key redacted)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/AppConnection" }
        "401": { $ref: "#/components/responses/Unauthorized" }
    post:
      summary: Add an app-sync connection (mints a dedicated harbrr key)
      operationId: createConnection
      tags: [App Connections]
      security: [{ session: [] }, { apiKey: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateConnection" }
      responses:
        "201":
          description: the created connection
          content:
            application/json:
              schema: { $ref: "#/components/schemas/AppConnection" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }

  /api/app-connections/sync:
    post:
      summary: Reconcile every app-sync connection now
      operationId: syncAllConnections
      tags: [App Connections]
      security: [{ session: [] }, { apiKey: [] }]
      responses:
        "200":
          description: per-connection sync outcomes (one entry per connection)
          content:
            application/json:
              schema:
                type: array
                items: { $ref: "#/components/schemas/ConnectionSyncResult" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /api/app-connections/{id}:
    get:
      summary: Get an app-sync connection (app key redacted)
      operationId: getConnection
      tags: [App Connections]
      security: [{ session: [] }, { apiKey: [] }]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer, format: int64 } }
      responses:
        "200":
          description: the connection
          content:
