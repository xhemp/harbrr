  /api/indexers/{slug}/results/torznab/full/api:
    get:
      tags: [Torznab Feed]
      summary: Torznab search — freeleech-bypass variant (/api alias)
      description: >
        Identical to /api/indexers/{slug}/results/torznab/full — the /api
        suffix is the alternate path some clients use.
      operationId: torznabResultsFullApi
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string }, description: the configured indexer slug }
        - { name: apikey, in: query, required: false, schema: { type: string }, description: "feed credential; passkey is an accepted alias" }
        - { name: passkey, in: query, required: false, schema: { type: string }, description: alias for apikey }
        - { name: t, in: query, required: false, schema: { type: string }, description: "function: caps | search | tvsearch | movie | music | book (defaults to search)" }
        - { name: q, in: query, required: false, schema: { type: string }, description: free-text query }
        - { name: cat, in: query, required: false, schema: { type: string }, description: comma-separated newznab category ids }
        - { name: imdbid, in: query, required: false, schema: { type: string } }
        - { name: tmdbid, in: query, required: false, schema: { type: string } }
        - { name: tvdbid, in: query, required: false, schema: { type: string } }
        - { name: season, in: query, required: false, schema: { type: string } }
        - { name: ep, in: query, required: false, schema: { type: string } }
        - { name: limit, in: query, required: false, schema: { type: integer }, description: page size }
        - { name: offset, in: query, required: false, schema: { type: integer } }
        - { name: nocache, in: query, required: false, schema: { type: string, enum: ["1"] }, description: "set to 1 to bypass the search cache and force a live tracker fetch" }
        - { name: If-None-Match, in: header, required: false, schema: { type: string }, description: "a previously-returned ETag; a match yields 304 Not Modified when the cached results are unchanged" }
        - { name: Cache-Control, in: header, required: false, schema: { type: string }, description: "no-cache / no-store forces a live tracker fetch (the header sibling of nocache=1) and suppresses the 304 short-circuit" }
      responses:
        "200":
          description: a Torznab capabilities document or results feed (XML), or a Torznab <error> element
          headers:
            ETag:
              schema: { type: string }
              description: strong validator over the cached result set (present only for a cache-backed results feed)
            Cache-Control:
              schema: { type: string }
              description: "private, max-age=<remaining cache TTL seconds> for a cache-backed results feed"
          content:
            application/xml:
              schema: { type: string }
        "304":
          description: >
            Not Modified — the request's If-None-Match matched the current cached
            results, so the body is omitted (shares the base feed's cache behavior).
          headers:
            ETag:
              schema: { type: string }
            Cache-Control:
              schema: { type: string }
        "400":
          description: a Torznab <error> element (XML) for an unknown function or an unsupported id parameter
          content:
            application/xml:
              schema: { type: string }
        "500":
          description: a generic Torznab <error> element (XML)
          content:
            application/xml:
              schema: { type: string }

  /api/indexers/{slug}/dl:
    get:
      tags: [Torznab Feed]
      summary: Grab-time download proxy (resolves and streams the torrent)
      description: >
        The download endpoint emitted in the feed for a resolver-needing indexer.
        harbrr decodes the opaque, AEAD-sealed token into the original
        (passkey-bearing) link, resolves and fetches the torrent server-side, and
        streams it back — so the passkey never reaches the client. A resolved magnet
        (public, no secret) is returned as a 302 redirect instead. Authenticated by
        the apikey (or passkey) query parameter.
      operationId: torznabDownload
      parameters:
        - { name: slug, in: path, required: true, schema: { type: string }, description: the configured indexer slug }
        - { name: apikey, in: query, required: false, schema: { type: string }, description: "feed credential; passkey is an accepted alias" }
        - { name: passkey, in: query, required: false, schema: { type: string }, description: alias for apikey }
        - { name: token, in: query, required: true, schema: { type: string }, description: "the opaque, AEAD-sealed download token from the feed" }
      responses:
        "200":
          description: >
            The torrent file (application/x-bittorrent) on success. Unlike the
            caps/search feed, the /dl route returns real HTTP status codes for gate
            failures (matching Jackett's DownloadController), so *arr surfaces them as
            transport errors rather than accepting a 200 that later fails as an invalid
            torrent file.
          content:
            application/x-bittorrent:
              schema: { type: string, format: binary }
        "302":
          description: redirect to a resolved magnet URI (only ever a magnet, never an http link)
        "400":
          description: a Torznab <error> element (XML) for an invalid or forged download token
          content:
            application/xml:
              schema: { type: string }
        "401":
          description: >
            a Torznab <error> element (XML) for a missing or invalid API key
            (Jackett's DownloadController returns Unauthorized)
          content:
            application/xml:
              schema: { type: string }
        "404":
          description: >
            a Torznab <error> element (XML) for an unknown/unsupported indexer, or a
            plain-text body when the resolved payload is not a valid torrent (the
            serve-boundary bencode check, mirroring Jackett's BencodeParser → NotFound,
            uses http.Error rather than the Torznab XML shape); the link/passkey is
            never echoed
          content:
            application/xml:
              schema: { type: string }
            text/plain:
              schema: { type: string }
        "500":
          description: a generic Torznab <error> element (XML); the link/passkey is never echoed
          content:
            application/xml:
              schema: { type: string }
        "503":
          description: >
            a Torznab <error> element (XML) when the download proxy is not enabled
            (the feature is unavailable)
          content:
            application/xml:
              schema: { type: string }

  /api/proxies:
