name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on a PR branch; never cancel main-branch history.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Test and build run as separate, parallel jobs so a build failure and a test
  # failure are reported independently and neither waits on the other. The engine
  # is pure Go with no OS-specific files or build tags and ships as a Linux
  # binary/container, so a single Linux leg with the race detector is
  # authoritative; vet is covered by golangci-lint (govet) in lint.yml.
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: test (race)
        run: go test -race -count=1 ./...

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: build
        run: go build ./...

  # Compile-only portability check for the native-binary release targets
  # (seekbrr ships as Docker + native binaries, like qui). This is cross-
  # compilation on Linux — no native runners — so it stays cheap and runs in
  # parallel with the test job. Full packaging is a later GoReleaser job
  # (docs/plan.md: "Docker image + config file").
  cross-build:
    name: cross-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        target:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: build ${{ matrix.target.goos }}/${{ matrix.target.goarch }}
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: "0"
        run: go build ./...

  # Build the container image so a broken Dockerfile fails CI — the Docker path is
  # how *arr apps reach harbrr, so it must not silently rot. Build (single-platform,
  # loaded into the daemon) + a `version` smoke-run that proves the image actually
  # runs; no registry push. Publishing/release packaging stays the later GoReleaser
  # job referenced above.
  docker:
    name: docker
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v3
      - name: build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: harbrr:ci
          build-args: |
            VERSION=ci
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: validate image runs
        run: docker run --rm --entrypoint harbrr harbrr:ci version
