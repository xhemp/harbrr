name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on a PR branch; never cancel main-branch history.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Tool-agnostic guard: block hand-edits to the vendored Jackett snapshot
  # (internal/indexer/definitions/vendor/**), which is consumed byte-for-byte. This is
  # the authoritative, non-bypassable enforcement of AGENTS.md's #1 rule — a contributor
  # using any editor/agent is caught here, unlike the local pre-commit / editor hooks.
  # The scheduled refresh branch (chore/vendor-definitions) is exempt inside the script.
  vendor-guard:
    name: vendor-guard
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Guard vendored definitions
        run: scripts/check-vendor-untouched.sh --ci

  # Test and build run as separate, parallel jobs so a build failure and a test
  # failure are reported independently and neither waits on the other. The engine
  # is pure Go with no OS-specific files or build tags and ships as a Linux
  # binary/container, so a single Linux leg with the race detector is
  # authoritative; vet is covered by golangci-lint (govet) in lint.yml.
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: test (race)
        run: go test -race -count=1 ./...

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: build
        run: go build ./...

  # Cross-compile the release binary for every native target on the Linux runner (Go
  # cross-compiles natively — no emulation). This is both the portability check and the
  # source of the Linux binaries the docker job packages: the image build COPYs these
  # instead of recompiling Go in-container (the autobrr/qui + seedsync pattern), so the
  # binary is built exactly once. Full packaging (GoReleaser) is a later job.
  cross-build:
    # Name is the job key only — the matrix appends "(goos, goarch)", which is the exact
    # required-status-check context on main (e.g. "cross-build (linux, amd64)"). Do not
    # add a custom name: it would change the check name and the branch's required checks
    # would wait forever on a context that no longer reports.
    name: cross-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        target:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      # Full history so `git describe --tags` can stamp the binary version (matches the
      # Makefile's ldflags), the same way `make build` does locally. The job only runs
      # read-only git ops after checkout, so don't persist the token in .git/config.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: build ${{ matrix.target.goos }}/${{ matrix.target.goarch }}
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: "0"
        run: |
          version="$(git describe --tags --always --dirty 2>/dev/null || echo 0.0.0-dev)"
          commit="$(git rev-parse --short HEAD)"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -trimpath -ldflags "-s -w \
            -X github.com/autobrr/harbrr/internal/version.Version=${version} \
            -X github.com/autobrr/harbrr/internal/version.Commit=${commit} \
            -X github.com/autobrr/harbrr/internal/version.Date=${date}" \
            -o dist/harbrr ./cmd/harbrr
      # The docker job reuses these Linux binaries (COPYs them instead of recompiling Go
      # in-container), so upload one per Linux arch for it to download.
      - name: upload linux binary
        if: ${{ matrix.target.goos == 'linux' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bin-linux-${{ matrix.target.goarch }}
          path: dist/harbrr
          if-no-files-found: error
          retention-days: 1

  # Package the container image so a broken Dockerfile fails CI — the Docker path is how
  # *arr apps reach harbrr, so it must not silently rot. Each architecture builds on its
  # OWN runner in parallel (wall-clock = slowest single arch, not the sum) with a
  # per-arch GHA cache scope so the two don't evict each other's layers. The image build
  # does NOT recompile Go: it injects the prebuilt linux binary from cross-build via a
  # `build` build-context (so the Dockerfile's compile stage is replaced), leaving just
  # COPYs + the native certs stage — no QEMU-emulated toolchain or package install on the
  # critical path (the autobrr/qui + seedsync pattern). amd64 loads the image and runs
  # `version` to prove it works. On a same-repo PR or a version tag each arch is pushed
  # to GHCR by digest and docker-merge assembles the multi-arch manifest; a fork PR or a
  # plain main push builds (to validate) but does not push.
  docker:
    name: docker (${{ matrix.arch }})
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [cross-build]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, load: true }
          - { arch: arm64, load: false }
    env:
      IMAGE: ghcr.io/${{ github.repository }}
      # Push to GHCR on a same-repo PR (testable before merge) or a version tag (release).
      PUSH: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') || (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')) }}
    steps:
      # The job pushes to a registry (packages: write) and runs no git operations after
      # checkout, so don't persist the token in the git config (smaller blast radius).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # The prebuilt linux binary from cross-build replaces the Dockerfile's `build`
      # stage (build-contexts below), so the image build never recompiles Go. It lands at
      # out/harbrr — the path the Dockerfile's `COPY --from=build /out/harbrr` expects.
      - name: download prebuilt binary (${{ matrix.arch }})
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: bin-linux-${{ matrix.arch }}
          path: /tmp/binctx/out

      # Always build this arch (validates the Dockerfile). amd64 loads it for the smoke
      # run; arm64 builds to cache without loading (it can't run on an amd64 host).
      - name: build image (${{ matrix.arch }})
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          build-contexts: |
            build=/tmp/binctx
          push: false
          load: ${{ matrix.load }}
          platforms: linux/${{ matrix.arch }}
          tags: harbrr:ci-${{ matrix.arch }}
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max
          provenance: false
      - name: validate image runs
        if: ${{ matrix.arch == 'amd64' }}
        run: docker run --rm --entrypoint harbrr harbrr:ci-amd64 version

      # When publishing: log in, then push this arch by digest (a cache hit on the build
      # above) and record the digest for the merge job.
      - name: log in to GHCR
        if: ${{ env.PUSH == 'true' }}
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: registry metadata
        id: meta
        if: ${{ env.PUSH == 'true' }}
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE }}
      - name: push by digest (${{ matrix.arch }})
        id: push
        if: ${{ env.PUSH == 'true' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          build-contexts: |
            build=/tmp/binctx
          platforms: linux/${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,scope=${{ matrix.arch }},mode=max
          provenance: false
      - name: export digest
        if: ${{ env.PUSH == 'true' }}
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.push.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"
      - name: upload digest
        if: ${{ env.PUSH == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Assemble the multi-arch manifest from the per-arch digests. Only runs when the docker
  # job pushed (same-repo PR or tag); it builds nothing, so it is fast. Gated on `test`
  # as well, so a failing test gate never publishes a pullable multi-arch tag (the
  # per-arch digests pushed earlier stay unreferenced and are harmless until then).
  docker-merge:
    name: docker-merge
    runs-on: ubuntu-latest
    needs: [docker, test]
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - name: download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - name: log in to GHCR
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: registry metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
      - name: create manifest list and push
        working-directory: /tmp/digests
        run: |
          # word-splitting is intentional: expand to `-t tag1 -t tag2 …` + one image
          # ref per digest file (the standard buildx imagetools manifest-merge idiom).
          # IMAGE / DOCKER_METADATA_OUTPUT_JSON come from env, not template interpolation.
          # shellcheck disable=SC2046
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "$IMAGE@sha256:%s " *)
      - name: inspect
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: docker buildx imagetools inspect "$IMAGE:$VERSION"
