name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths-ignore:
      - "docs/**"
      - "website/**"
      - "**/*.md"
  pull_request:
    paths-ignore:
      - "docs/**"
      - "website/**"
      - "**/*.md"
  # Manual release fallback: dispatch this workflow against a `v*` tag to (re)run a
  # release without re-tagging — goreleaser and the docker publish treat a dispatch
  # aimed at a tag exactly like the tag push. Dispatching against a branch just runs CI.
  workflow_dispatch:

permissions:
  contents: read

env:
  GO_VERSION: 1.26.5

# Cancel superseded runs on a PR branch; never cancel main-branch history.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Tool-agnostic guard: block hand-edits to the vendored Jackett snapshot
  # (internal/indexer/definitions/vendor/**), which is consumed byte-for-byte. This is
  # the authoritative, non-bypassable enforcement of AGENTS.md's #1 rule — a contributor
  # using any editor/agent is caught here, unlike the local pre-commit / editor hooks.
  # The scheduled refresh branch (chore/vendor-definitions) is exempt inside the script.
  vendor-guard:
    name: vendor-guard
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Guard vendored definitions
        run: scripts/check-vendor-untouched.sh --ci

  # `go test` compiles every package (and test file) before running, so it doubles as
  # the compile check. The race suite is split into package shards because the full
  # single-job run is CI's long pole; every shard still runs with -race -count=1.
  # Cross-build below covers other platforms and vet is covered by golangci-lint (govet).
  backend-test:
    name: backend-test (${{ matrix.shard.name }})
    runs-on: self-hosted
    # Match the Dockerfile's build stage (golang:1.26-alpine) so the toolchain that
    # tests is the image's own musl Go — hence no actions/setup-go here (it would
    # download a glibc Go and shadow the image's on PATH, silently defeating the
    # point) and GOTOOLCHAIN=local (so a go.mod toolchain bump fails loud instead of
    # fetching a glibc Go behind our back). GitHub Actions injects its own
    # glibc-linked Node runtime into container jobs to run JS-based actions
    # (checkout, cache); a bare Alpine container is musl-only and that Node binary
    # fails immediately on the first action step — `gcompat` shims the missing glibc
    # symbols and must be installed before any other step. `build-base` (gcc +
    # musl-dev) is required because `go test -race` always needs cgo, unlike the
    # Dockerfile's CGO_ENABLED=0 product build.
    container:
      image: golang:1.26-alpine
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        shard:
          - name: cardigann
            packages: ./internal/indexer/cardigann/...
          - name: state-api
            packages: ./internal/appsync/... ./internal/auth/... ./internal/database/... ./internal/indexer/registry/... ./internal/web/api/...
          - name: rest
            packages: $(go list ./... | grep -Ev '/internal/indexer/cardigann(/|$)|/internal/(appsync|auth|database)(/|$)|/internal/indexer/registry(/|$)|/internal/web/api(/|$)')
    env:
      CGO_ENABLED: "1"
      GOTOOLCHAIN: local
      # In a container job the workspace bind-mount is owned by the host runner's
      # uid, not the step's user, so git refuses it (safe.directory) and go's VCS
      # stamping dies with exit 128 on every go list/test of a main package. Tests
      # and package listings don't need VCS stamps — disable them outright.
      GOFLAGS: -buildvcs=false
      # Owned by the non-root `ci` user the tests run as (see the test step).
      GOMODCACHE: /home/ci/go/pkg/mod
      GOCACHE: /home/ci/.cache/go-build
    steps:
      - name: install container prerequisites (gcompat for GHA's Node runtime, git for checkout/go mod, build-base for -race's cgo requirement, ruby for the shard-coverage guard, tar for actions/cache)
        run: |
          apk add --no-cache gcompat git build-base ruby tar
          adduser -D ci
      # No git ops after checkout, and the tests below run as the less-trusted `ci`
      # user — don't leave the GITHUB_TOKEN readable in .git/config.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # Module cache is identical across shards, so key it on go.sum only (not the shard):
      # the 3 shards share ONE entry instead of each storing a duplicate copy, easing the
      # ~10GB per-repo cache LRU. Concurrent same-key saves from parallel shards no-op.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /home/ci/go/pkg/mod
          key: alpine-gomod-${{ env.GO_VERSION }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            alpine-gomod-${{ env.GO_VERSION }}-
      # Build cache is shard-specific (each shard compiles a different package set) — keep
      # it per-shard for a warm incremental compile.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: /home/ci/.cache/go-build
          key: alpine-gobuild-${{ matrix.shard.name }}-${{ env.GO_VERSION }}-${{ hashFiles('go.sum') }}
          restore-keys: |
            alpine-gobuild-${{ matrix.shard.name }}-${{ env.GO_VERSION }}-
      - name: guard shard package coverage
        if: matrix.shard.name == 'rest'
        run: |
          ruby -ryaml -e 'YAML.load_file(".github/workflows/ci.yml").fetch("jobs").fetch("backend-test").fetch("strategy").fetch("matrix").fetch("shard").each { |s| puts "#{s.fetch("name")}\t#{s.fetch("packages")}" }' |
            while IFS=$'\t' read -r shard packages; do
              echo "expanding ${shard}" >&2
              eval "go list ${packages}"
            done |
            sort -u > /tmp/backend-shard-packages.txt
          go list ./... | sort -u > /tmp/backend-all-packages.txt
          diff -u /tmp/backend-all-packages.txt /tmp/backend-shard-packages.txt
      # Run as a non-root user: container jobs default to root, and root bypasses
      # file permissions — internal/secrets' fail-closed keyring test (unreadable
      # key_file must be fatal, never a plaintext fallback) t.Skips as root, which
      # would silently drop the suite's security coverage. The command goes through
      # a script file so the rest shard's $(go list ...) packages expression expands
      # in the ci user's shell with ci's Go env (busybox su also resets PATH/HOME,
      # so PATH is handed through explicitly).
      - name: test (race, non-root)
        run: |
          chown -R ci: /home/ci
          cat > /tmp/shard-test.sh <<'SCRIPT'
          set -eu
          export HOME=/home/ci CGO_ENABLED=1 GOTOOLCHAIN=local GOFLAGS=-buildvcs=false GOMODCACHE=/home/ci/go/pkg/mod GOCACHE=/home/ci/.cache/go-build
          cd "$1"
          go test -race -count=1 ${{ matrix.shard.packages }}
          SCRIPT
          su ci -s /bin/sh -c "PATH='$PATH' /bin/sh /tmp/shard-test.sh '$PWD'"

  # Frontend Vitest suite — mirrors the Go `test` job and gates docker-merge alongside it.
  web-test:
    name: web-test
    runs-on: self-hosted
    container:
      image: node:22-alpine
    timeout-minutes: 10
    steps:
      - name: install container prerequisites
        run: apk add --no-cache gcompat git libatomic
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: web/package.json
      - name: install
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: test
        working-directory: web
        run: pnpm test

  # Frontend ESLint (type-aware rules via typescript-eslint recommendedTypeChecked) —
  # mirrors golangci-lint and runs in parallel with it.
  web-lint:
    name: web-lint
    runs-on: self-hosted
    container:
      image: node:22-alpine
    timeout-minutes: 10
    steps:
      - name: install container prerequisites
        run: apk add --no-cache gcompat git libatomic
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: web/package.json
      - name: install
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: lint
        working-directory: web
        run: pnpm lint

  # Frontend tsc type-check — independent of ESLint, mirrors golangci-lint tier.
  # Uses `tsc -b` (project references; noEmit already set in tsconfig.app.json).
  web-typecheck:
    name: web-typecheck
    runs-on: self-hosted
    container:
      image: node:22-alpine
    timeout-minutes: 10
    steps:
      - name: install container prerequisites
        run: apk add --no-cache gcompat git libatomic
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: web/package.json
      - name: install
        working-directory: web
        run: pnpm install --frozen-lockfile
      - name: typecheck
        working-directory: web
        run: pnpm typecheck

  # Production build of the SPA (web/). The dist bundle is uploaded as an artifact and
  # every binary-producing job (cross-build, docker, goreleaser) downloads it instead of
  # rebuilding, so all shipped binaries embed the identical bundle.
  web:
    name: web
    runs-on: self-hosted
    container:
      image: node:22-alpine
    timeout-minutes: 10
    steps:
      - name: install container prerequisites
        run: apk add --no-cache bash gcompat git libatomic
      # read-only git ops (the route-tree drift check) after checkout, so don't persist the token in .git/config.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          package_json_file: web/package.json
      - name: install
        working-directory: web
        run: pnpm install --frozen-lockfile
      # The route tree is generated from src/routes and committed; a contributor
      # who adds a route but forgets `pnpm generate:routes` fails here, not in a
      # teammate's surprise diff later.
      - name: route-tree drift check
        working-directory: web
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          pnpm exec tsr generate
          git -C "$GITHUB_WORKSPACE" diff --exit-code -- web/src/routeTree.gen.ts
      - name: build
        working-directory: web
        run: pnpm build:bundle
      - name: guard the bundle
        run: scripts/check-web-dist.sh
      - name: upload dist artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error
          retention-days: 1

  golangci-lint:
    name: golangci-lint
    runs-on: self-hosted
    # Alpine container matching the Dockerfile's build stage, lint run by the
    # image's own Go — see backend-test above for the full gcompat / no-setup-go /
    # GOTOOLCHAIN=local rationale. No non-root user here: linting has no
    # permission-gated tests, and golangci-lint-action manages its own cache.
    container:
      image: golang:1.26-alpine
    timeout-minutes: 10
    env:
      GOTOOLCHAIN: local
    steps:
      - name: install container prerequisites (gcompat for GHA's Node runtime, git for checkout/go mod, tar for golangci-lint-action's cache)
        run: apk add --no-cache gcompat git tar
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          # Pin the version so the action's cache key is stable run-to-run
          # (keep in sync with the version in `make tools`).
          version: v2.12.2
          only-new-issues: ${{ github.event_name == 'pull_request' }}

  # gitleaks is the source-of-truth secret scanner; the CLI binary is run directly
  # (pinned by version + SHA-256) because gitleaks/gitleaks-action needs a paid license
  # on org repos. check-no-secrets.sh is a targeted tracker-credential backstop.
  secret-scan:
    name: secret scan
    runs-on: self-hosted
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # gitleaks scans full commit history
      - name: install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
          GITLEAKS_SHA256: "551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb"
        run: |
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" -o gitleaks.tar.gz
          echo "${GITLEAKS_SHA256}  gitleaks.tar.gz" | sha256sum -c -
          tar -xzf gitleaks.tar.gz gitleaks
          ./gitleaks version
      - name: gitleaks scan
        run: ./gitleaks git . --config .gitleaks.toml --redact --exit-code 1
      - name: tracker-secret backstop
        run: scripts/check-no-secrets.sh --all

  # govulncheck reports CVEs on the call paths harbrr actually reaches (low noise); the
  # vulnerability DB is fetched fresh each run.
  govulncheck:
    name: govulncheck
    runs-on: self-hosted
    timeout-minutes: 10
    env:
      GOVULNCHECK_VERSION: v1.5.0
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          # Host job on the shared persistent self-hosted fleet: GOMODCACHE/GOCACHE
          # already persist in /root between runs, so a GHA cache round-trip is pure
          # overhead. Container jobs that need caching (backend-test) use actions/cache.
          cache: false
      - name: cache govulncheck
        id: govulncheck-cache
        uses: actions/cache@a7833574556fa59680c1b7cb190c1735db73ebf0 # v5.0.0
        with:
          path: ~/go/bin/govulncheck
          key: govulncheck-${{ runner.os }}-${{ runner.arch }}-${{ env.GOVULNCHECK_VERSION }}
      - name: install govulncheck
        if: steps.govulncheck-cache.outputs.cache-hit != 'true'
        run: go install golang.org/x/vuln/cmd/govulncheck@${GOVULNCHECK_VERSION}
      - name: govulncheck
        run: govulncheck ./...

  # Cross-compile the non-Linux targets on the Linux runner (Go cross-compiles
  # natively — no emulation). Linux binaries are already built by the docker jobs,
  # so keeping them here would duplicate CI work. Depends on the web job only to
  # reuse its dist artifact — every cross-built binary embeds the same tested bundle.
  # Full packaging is the goreleaser job below.
  cross-build:
    # Name is the job key only — the matrix appends "(goos, goarch)", which is the
    # exact required-status-check context on main (e.g. "cross-build (darwin, amd64)").
    # Do not add a custom name: it would change the check name and the branch's
    # required checks would wait forever on a context that no longer reports.
    name: cross-build
    runs-on: self-hosted
    timeout-minutes: 10
    needs: [web]
    strategy:
      fail-fast: false
      matrix:
        target:
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      # Full history so `git describe --tags` can stamp the binary version (matches the
      # Makefile's ldflags), the same way `make build` does locally. The job only runs
      # read-only git ops after checkout, so don't persist the token in .git/config.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          # Host job on the shared persistent self-hosted fleet: GOMODCACHE/GOCACHE
          # already persist in /root between runs, so a GHA cache round-trip is pure
          # overhead. Container jobs that need caching (backend-test) use actions/cache.
          cache: false
      - name: download web dist (built once by the web job)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-dist
          path: web/dist
      - name: guard the bundle
        run: scripts/check-web-dist.sh
      - name: build ${{ matrix.target.goos }}/${{ matrix.target.goarch }}
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: "0"
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          version="$(scripts/ci-version.sh)"
          commit="$(git -c safe.directory="$GITHUB_WORKSPACE" rev-parse --short HEAD)"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -trimpath -ldflags "-s -w \
            -X github.com/autobrr/harbrr/internal/version.Version=${version} \
            -X github.com/autobrr/harbrr/internal/version.Commit=${commit} \
            -X github.com/autobrr/harbrr/internal/version.Date=${date}" \
            -o dist/harbrr ./cmd/harbrr

  # Package the container image so a broken Dockerfile fails CI — the Docker path is how
  # *arr apps reach harbrr, so it must not silently rot. Runs in parallel with the Go
  # test/lint jobs (needs only `web`, to reuse its dist artifact): each arch natively
  # cross-compiles its own linux binary (Go, no emulation) and injects it via a `build`
  # build-context, so the Dockerfile's compile stage is replaced — leaving just COPYs +
  # the certs stage, no QEMU toolchain on the critical path. Each arch builds on its own
  # runner with a per-arch GHA cache scope.
  # amd64 loads the image and runs `version` to prove it works. On a same-repo PR or a
  # version tag each arch is pushed to GHCR by digest; docker-merge (gated on test + lint)
  # then assembles the pullable multi-arch manifest.
  docker:
    name: docker (${{ matrix.arch }})
    runs-on: self-hosted
    timeout-minutes: 20
    needs: [web]
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - { arch: amd64, load: true }
          - { arch: arm64, load: false }
    env:
      IMAGE: ghcr.io/${{ github.repository }}
      IMAGE_TAG: harbrr:ci-${{ github.run_id }}-${{ matrix.arch }}
      # Push to GHCR on a same-repo PR (testable before merge), main (develop tag),
      # or a version tag (release, whether that tag arrived via push or a manual
      # dispatch aimed at the tag).
      PUSH: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') || (github.event_name == 'push' && github.ref == 'refs/heads/main') || ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && startsWith(github.ref, 'refs/tags/')) }}
    steps:
      # The job pushes to a registry (packages: write) and runs no git operations after
      # checkout, so don't persist the token in the git config (smaller blast radius).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # git describe for the version stamp
          persist-credentials: false
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          # Host job on the shared persistent self-hosted fleet: GOMODCACHE/GOCACHE
          # already persist in /root between runs, so a GHA cache round-trip is pure
          # overhead. Container jobs that need caching (backend-test) use actions/cache.
          cache: false
      - uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0
        if: matrix.arch == 'arm64'
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      # The image ships the UI: the web job built (and tested) the bundle once; download
      # it so web/dist is embedded at the Go compile (a gitkeep-only dist would serve
      # "frontend not built"), and hard-fail if the artifact is empty. PR images get the
      # UI too — they are pulled for live validation on real stacks.
      - name: download web dist (built once by the web job)
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-dist
          path: web/dist
      - name: guard the bundle
        run: scripts/check-web-dist.sh

      # Natively cross-compile this arch's linux binary (no QEMU) into the build-context
      # the Dockerfile's `COPY --from=build /out/harbrr` expects — replacing its compile stage.
      - name: build linux/${{ matrix.arch }} binary
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: "0"
          BINCTX: ${{ runner.temp }}/binctx-${{ matrix.arch }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          rm -rf "$BINCTX"
          mkdir -p "$BINCTX/out"
          version="$(scripts/ci-version.sh)"
          commit="$(git -c safe.directory="$GITHUB_WORKSPACE" rev-parse --short HEAD)"
          date="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -trimpath -ldflags "-s -w \
            -X github.com/autobrr/harbrr/internal/version.Version=${version} \
            -X github.com/autobrr/harbrr/internal/version.Commit=${commit} \
            -X github.com/autobrr/harbrr/internal/version.Date=${date}" \
            -o "$BINCTX/out/harbrr" ./cmd/harbrr

      # Always build this arch (validates the Dockerfile). amd64 loads it for the smoke
      # run; arm64 builds to cache without loading (it can't run on an amd64 host).
      - name: build image (${{ matrix.arch }})
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          build-contexts: |
            build=${{ runner.temp }}/binctx-${{ matrix.arch }}
          push: false
          load: ${{ matrix.load }}
          platforms: linux/${{ matrix.arch }}
          tags: ${{ env.IMAGE_TAG }}
          # No buildx GHA cache: in CI the compile runs in the prior `go build` step and is
          # injected via build-contexts, so buildx only COPYs the binary and rebuilds the tiny
          # native certs stage (seconds). type=gha,mode=max re-uploaded those layers for no
          # reuse and was the biggest consumer of the ~10GB repo cache budget.
          provenance: false
      - name: validate image runs
        if: ${{ matrix.arch == 'amd64' }}
        run: docker run --rm --entrypoint harbrr "$IMAGE_TAG" version

      # When publishing: log in, then push this arch by digest (a cache hit on the build
      # above) and record the digest for the merge job.
      - name: log in to GHCR
        if: ${{ env.PUSH == 'true' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: registry metadata
        id: meta
        if: ${{ env.PUSH == 'true' }}
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE }}
      - name: push by digest (${{ matrix.arch }})
        id: push
        if: ${{ env.PUSH == 'true' }}
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          build-contexts: |
            build=${{ runner.temp }}/binctx-${{ matrix.arch }}
          platforms: linux/${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          # No buildx GHA cache — see the build-image step above.
          provenance: false
      - name: export digest
        if: ${{ env.PUSH == 'true' }}
        env:
          DIGEST_DIR: ${{ runner.temp }}/digests-${{ matrix.arch }}
        run: |
          rm -rf "$DIGEST_DIR"
          mkdir -p "$DIGEST_DIR"
          digest="${{ steps.push.outputs.digest }}"
          touch "$DIGEST_DIR/${digest#sha256:}"
      - name: upload digest
        if: ${{ env.PUSH == 'true' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests-${{ matrix.arch }}/*
          if-no-files-found: error
          retention-days: 1
      - name: cleanup local smoke image
        if: ${{ always() && matrix.arch == 'amd64' }}
        run: docker rmi "$IMAGE_TAG" || true

  # Assemble the multi-arch manifest from the per-arch digests — the pullable publish
  # step. Only runs when the docker job pushed (same-repo PR or tag); it builds nothing,
  # so it is fast. Gated on `test` AND `golangci-lint`: a red test or lint never publishes
  # a pullable tag (the per-arch digests pushed earlier stay unreferenced/harmless until
  # then). The arch builds still run in parallel, so build feedback is immediate; only the
  # publish waits on the gate.
  docker-merge:
    name: docker-merge
    runs-on: self-hosted
    needs: [docker, backend-test, web-test, golangci-lint, web-lint, web-typecheck]
    if: >-
      (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
      packages: write
    env:
      IMAGE: ghcr.io/${{ github.repository }}
    steps:
      - name: prepare digest dir
        env:
          DIGEST_DIR: ${{ runner.temp }}/digests
        run: |
          rm -rf "$DIGEST_DIR"
          mkdir -p "$DIGEST_DIR"
      - name: download digests
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: registry metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=pr
            type=raw,value=develop,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
      - name: create manifest list and push
        env:
          DIGEST_DIR: ${{ runner.temp }}/digests
        run: |
          cd "$DIGEST_DIR"
          # word-splitting is intentional: expand to `-t tag1 -t tag2 …` + one image
          # ref per digest file (the standard buildx imagetools manifest-merge idiom).
          # IMAGE / DOCKER_METADATA_OUTPUT_JSON come from env, not template interpolation.
          # shellcheck disable=SC2046
          docker buildx imagetools create $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "$IMAGE@sha256:%s " *)
      - name: inspect
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: docker buildx imagetools inspect "$IMAGE:$VERSION"

  # GoReleaser: on a v* tag, build the binaries/archives/checksums and cut the GitHub
  # Release. On any other run (PR / main push) `goreleaser check` just validates
  # .goreleaser.yml — fast, so it doesn't slow PRs. The container image is published by
  # the docker jobs above; GoReleaser builds no image.
  goreleaser:
    name: goreleaser
    runs-on: self-hosted
    timeout-minutes: 20
    needs: [backend-test, web-test, golangci-lint, web-lint, web-typecheck, web]
    permissions:
      contents: write # create the GitHub Release (tag runs only)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0 # full history so the changelog can diff against the previous tag
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          # Host job on the shared persistent self-hosted fleet: GOMODCACHE/GOCACHE
          # already persist in /root between runs, so a GHA cache round-trip is pure
          # overhead. Container jobs that need caching (backend-test) use actions/cache.
          cache: false
      # Release binaries ship the UI: the web job built (and tested) the bundle once —
      # download it before goreleaser compiles, and hard-fail the release if it is
      # empty. Tag runs only — PR/main runs execute `goreleaser check`, which builds
      # nothing.
      - name: download web dist (built once by the web job)
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: web-dist
          path: web/dist
      - name: guard the bundle
        if: startsWith(github.ref, 'refs/tags/')
        run: scripts/check-web-dist.sh
      # Curated highlights for the GitHub Release header: pull the tag's section
      # from CHANGELOG.md into $RELEASE_HEADER, which goreleaser renders via
      # {{ .Env.RELEASE_HEADER }} above the auto feat/fix commit list. Runs on all
      # events (empty on non-tag) so `goreleaser check` always has the var defined.
      - name: assemble release header from CHANGELOG
        run: |
          header=""
          case "$GITHUB_REF" in
            refs/tags/*) header="$(scripts/changelog-extract.sh "${GITHUB_REF#refs/tags/}" || true)" ;;
          esac
          {
            echo "RELEASE_HEADER<<HARBRR_NOTES_EOF"
            printf '%s\n' "$header"
            echo "HARBRR_NOTES_EOF"
          } >> "$GITHUB_ENV"
      - name: goreleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: "~> v2"
          args: ${{ startsWith(github.ref, 'refs/tags/') && 'release --clean' || 'check' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
