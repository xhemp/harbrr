name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

# Cancel superseded runs on a PR branch; never cancel main-branch history.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Test and build run as separate, parallel jobs so a build failure and a test
  # failure are reported independently and neither waits on the other. The engine
  # is pure Go with no OS-specific files or build tags and ships as a Linux
  # binary/container, so a single Linux leg with the race detector is
  # authoritative; vet is covered by golangci-lint (govet) in lint.yml.
  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: test (race)
        run: go test -race -count=1 ./...

  build:
    name: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: build
        run: go build ./...

  # Compile-only portability check for the native-binary release targets
  # (seekbrr ships as Docker + native binaries, like qui). This is cross-
  # compilation on Linux — no native runners — so it stays cheap and runs in
  # parallel with the test job. Full packaging is a later GoReleaser job
  # (docs/plan.md: "Docker image + config file").
  cross-build:
    name: cross-build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        target:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
          - { goos: windows, goarch: amd64 }
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: true
      - name: build ${{ matrix.target.goos }}/${{ matrix.target.goarch }}
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: "0"
        run: go build ./...

  # Build the container image so a broken Dockerfile fails CI — the Docker path is
  # how *arr apps reach harbrr, so it must not silently rot. Every event builds a
  # single-arch image, loads it, and runs `version` to prove the image actually runs.
  # On a same-repo PR and on a version tag it then builds the multi-arch image
  # (amd64 + arm64) and pushes it to GHCR — so a PR can be pulled and tested before
  # merge, and a tag publishes a release. A fork PR (read-only token) and a plain
  # main push build but do not push. Native-binary release packaging (GoReleaser)
  # stays a later job.
  docker:
    name: docker
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      # The job pushes to a registry (packages: write) and runs no git operations
      # after checkout, so don't persist the token in the git config (reduces the
      # blast radius of the elevated token).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false
      - uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      # Always: build a single-arch image, load it into the daemon, and smoke-run it.
      - name: build image (amd64, for the smoke run)
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: false
          load: true
          platforms: linux/amd64
          tags: harbrr:ci
          build-args: |
            VERSION=ci
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: validate image runs
        run: docker run --rm --entrypoint harbrr harbrr:ci version

      # Publish to GHCR on a same-repo PR (testable before merge) or a version tag
      # (a release). The metadata step is gated, so its empty outputs skip the
      # login/push on a fork PR or a plain main push.
      - name: registry metadata
        id: meta
        if: >-
          (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.actor != 'dependabot[bot]') ||
          (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=short
      - name: log in to GHCR
        if: ${{ steps.meta.outputs.tags != '' }}
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: build and push (multi-arch)
        if: ${{ steps.meta.outputs.tags != '' }}
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.meta.outputs.version }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
