name: vendor-definitions

# Refresh the embedded Jackett definition snapshot on a schedule and open a PR
# when upstream changes. The commit is typed from the def diff — feat(defs) when
# new indexers arrive, fix(defs) when existing defs change — so goreleaser's
# release notes pick the refresh up by name (chore commits are filtered out of
# the changelog). website/docs/coverage.md is regenerated in the same PR so the
# corpus table tracks the snapshot. Pin JACKETT_REF below to a commit for
# reproducible release builds; this job tracks the moving tip for visibility.
on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  vendor:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Refresh Jackett definitions
        env:
          JACKETT_REF: master
        run: ./scripts/vendor-definitions.sh
      - name: Regenerate coverage table
        run: go run ./scripts/gencoverage > website/docs/coverage.md
      # Type the commit from the def diff so the release changelog captures it:
      # goreleaser groups feat(defs)/fix(defs) into the notes and drops chore
      # (the no-def-change fallback, e.g. a .jackett-ref-only bump).
      - name: Summarize definition changes
        id: summary
        run: |
          git add -A internal/indexer/definitions/vendor website/docs/coverage.md
          diff="$(git diff --cached --name-status -- internal/indexer/definitions/vendor)"
          names() { awk -v s="$1" '$1 == s && $2 ~ /\.ya?ml$/ {print $2}' <<<"$diff" | xargs -rn1 basename | sed -E 's/\.ya?ml$//' | paste -sd ', ' -; }
          added="$(names A)"
          removed="$(names D)"
          updated="$(awk '$1 == "M" && $2 ~ /\.ya?ml$/' <<<"$diff" | grep -c . || true)"
          if [ -n "$added" ]; then
            title="feat(defs): vendor refresh — add ${added}"
            if [ "$updated" -gt 0 ]; then title="${title} (+${updated} updated)"; fi
          elif [ -n "$removed" ]; then
            title="fix(defs): vendor refresh — remove ${removed}"
          elif [ "$updated" -gt 0 ]; then
            title="fix(defs): vendor refresh — ${updated} indexer definitions updated"
          else
            title="chore(defs): refresh vendored Jackett definitions"
          fi
          {
            echo "title=${title}"
            echo "body<<HARBRR_VENDOR_EOF"
            echo "Automated refresh of the embedded Jackett definition snapshot;"
            echo "\`website/docs/coverage.md\` is regenerated from the refreshed corpus."
            echo ""
            if [ -n "$added" ]; then echo "- **Added:** ${added}"; fi
            if [ -n "$removed" ]; then echo "- **Removed:** ${removed}"; fi
            echo "- **Updated:** ${updated} definitions"
            echo ""
            echo "Review the diff and the new \`.jackett-ref\` before merging."
            echo "HARBRR_VENDOR_EOF"
          } >> "$GITHUB_OUTPUT"
      # PRs created with the workflow's own GITHUB_TOKEN never trigger other
      # workflows (GitHub recursion guard), so CI would not run on the refresh
      # PR. VENDOR_DEFS_TOKEN is a fine-grained PAT (Contents + Pull requests:
      # read/write on this repo) that makes the PR trigger CI like a human's
      # would; without the secret this falls back to github.token — the PR still
      # opens, but CI must be started by closing/reopening it.
      - name: Open PR on change
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8
        with:
          token: ${{ secrets.VENDOR_DEFS_TOKEN || github.token }}
          commit-message: ${{ steps.summary.outputs.title }}
          title: ${{ steps.summary.outputs.title }}
          body: ${{ steps.summary.outputs.body }}
          branch: chore/vendor-definitions
          delete-branch: true
