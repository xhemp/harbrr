# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(deps)"
    groups:
      go:
        patterns: ["*"]
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
    groups:
      actions:
        patterns: ["*"]
  - package-ecosystem: "npm" # pnpm lockfile in web/
    directory: "/web"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(web-deps)"
    groups:
      web:
        patterns: ["*"]
    ignore:
      # TypeScript 7.0.x (the native/Go compiler) does not ship the JS compiler
      # API; openapi-typescript (api-types generation) and typescript-eslint
      # both crash on it. Only 7.0.x is ignored, so dependabot retries at 7.1
      # and that PR's CI is the revisit gate — see autobrr/harbrr#213.
      - dependency-name: "typescript"
        versions: ["7.0.x"]
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(docker)"
