# GoReleaser builds the release binaries + archives + checksums and cuts the GitHub
# Release on a `v*` tag. The Docker image is published separately by ci.yml (on tags and
# same-repo PRs), so it is intentionally NOT built here. See docs/architecture.md.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: harbrr
    main: ./cmd/harbrr
    binary: harbrr
    env:
      - CGO_ENABLED=0 # pure-Go (modernc sqlite) — clean cross-compile, no C toolchain
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/autobrr/harbrr/internal/version.Version={{ .Version }}
      - -X github.com/autobrr/harbrr/internal/version.Commit={{ .Commit }}
      - -X github.com/autobrr/harbrr/internal/version.Date={{ .Date }}
    goos:
      - linux
      - windows
      - darwin
      - freebsd
    goarch:
      - amd64
      - arm
      - arm64
    goarm:
      - "6"
    ignore:
      - { goos: windows, goarch: arm }
      - { goos: windows, goarch: arm64 }
      - { goos: darwin, goarch: arm }
      - { goos: freebsd, goarch: arm }
      - { goos: freebsd, goarch: arm64 }

archives:
  - id: harbrr-archive
    ids: [harbrr]
    format_overrides:
      - goos: windows
        formats: ["zip"]
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: "checksums.txt"

# The auto changelog is deliberately curated to the two groups that matter for a
# release — features and fixes. Chore/ci/docs/deps/refactor/test/merge commits are
# filtered out so the notes read as a product changelog, not a git dump. The
# human-written highlights for the release are prepended via release.header (see
# below); this section is what goreleaser appends beneath them.
changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^Merge "
      - "go mod tidy"
      - "^harbrr: initial commit"
      - '(?i)^(chore|ci|build|docs|test|style|refactor|perf)(\(.+\))?!?:'
      # Internal-process churn — not a user-facing change even when typed as fix:
      - '(?i)reviewed? findings?'
      - '(?i)test fixtures?'
      - '(?i)\blint\b'
  groups:
    - title: "🚀 New Features"
      regexp: '^.*feat(\(.+\))?!?:.*$'
      order: 0
    - title: "🐛 Bug Fixes"
      regexp: '^.*fix(\(.+\))?!?:.*$'
      order: 1

release:
  prerelease: auto # a tag like v0.1.0-alpha is published as a pre-release
  # Curated highlights for the tag, injected by CI from the CHANGELOG.md section
  # (scripts/changelog-extract.sh -> $RELEASE_HEADER). Empty when a tag has no
  # CHANGELOG entry, so the release still publishes with just the commit list.
  header: |
    {{ .Env.RELEASE_HEADER }}
  footer: |
    **Full Changelog**: https://github.com/{{ .Env.GITHUB_REPOSITORY_OWNER }}/harbrr/compare/{{ .PreviousTag }}...{{ .Tag }}

    ## Docker image

    - `docker pull ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/harbrr:{{ .Version }}`
    {{- if not .Prerelease }}
    - `docker pull ghcr.io/{{ .Env.GITHUB_REPOSITORY_OWNER }}/harbrr:latest`
    {{- end }}

    ## Getting started

    - [Getting started](https://github.com/{{ .Env.GITHUB_REPOSITORY_OWNER }}/harbrr/blob/main/website/docs/getting-started.md) · [Docker compose example](https://github.com/{{ .Env.GITHUB_REPOSITORY_OWNER }}/harbrr/blob/main/docker-compose.example.yml)

    Thanks for trying harbrr! 🐇
