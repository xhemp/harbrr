version: "2"

# Base: autobrr/qui's config (family consistency), extended for harbrr with
# gofumpt formatting, no-god-function complexity gates, and extra type-safety.

issues:
  max-same-issues: 0

formatters:
  enable:
    - gofumpt
    - goimports
  settings:
    gofumpt:
      extra-rules: true
    goimports:
      local-prefixes:
        - github.com/autobrr/harbrr

linters:
  enable:
    # --- inherited from autobrr/qui ---
    - containedctx
    - copyloopvar
    - errname
    - errorlint
    - exhaustive
    - fatcontext
    - gocritic
    - gosec
    - loggercheck
    - mirror
    - misspell
    - noctx
    - perfsprint
    - prealloc
    - revive
    - rowserrcheck
    - spancheck
    - testifylint
    - unconvert
    - whitespace
    # --- harbrr: no god functions (enforced, not just reviewed) ---
    - funlen
    - gocyclo
    - gocognit
    - nestif
    # --- harbrr: extra type safety ---
    - forcetypeassert
    - nilnil
    - wrapcheck
    # --- harbrr: resource-leak & correctness (pre-alpha hardening) ---
    - bodyclose          # every HTTP response body is closed (harbrr is HTTP-heavy)
    - sqlclosecheck      # sql.Rows/Stmt are closed
    - bidichk            # trojan-source / bidi-unicode in untrusted tracker data
    - gocheckcompilerdirectives # validate //go:build / //go:embed (a typo silently disables)
    - durationcheck      # catch time.Duration multiplication bugs (TTLs/backoff/rate limits)
    - makezero           # no append to a slice made with a non-zero length
    - interfacebloat     # guardrail against god-interfaces (see settings)
    - wastedassign       # no assignment whose value is never read
    - reassign           # no reassigning another package's exported vars
    - predeclared        # no shadowing predeclared identifiers (e.g. a var named `comparable`)

  settings:
    wrapcheck:
      # native.Base errors (Do/DoDownload/NewBase/TestViaSearch) are caller-ready by
      # design: already family-prefixed, host-only-redacted, and sentinel-bearing.
      # Re-wrapping them in a driver would double the family prefix ("hdbits: hdbits:")
      # and add nothing — the base IS the drivers' error-shaping layer.
      #
      # connresource.Lifecycle[T].Create/Update/Delete are the same shape: they are
      # appsync/announce/notify's error-shaping layer for the connection-resource
      # lifecycle, already sentinel-bearing (domain.ErrInvalid/ErrConflict) or a
      # fully-formed fail-closed revoke message via the spec's Conflict/RevokeFailMsg
      # closures. Re-wrapping at each call site would only add a redundant prefix.
      #
      # domain.ValidateAbsURL is the one canonical URL validator appsync/announce/
      # notify share; it already returns a domain.ErrInvalid-wrapped, field-labeled
      # message a caller returns verbatim (that message IS the api-facing text).
      ignore-package-globs:
        - github.com/autobrr/harbrr/internal/indexer/native
        - github.com/autobrr/harbrr/internal/connresource
        - github.com/autobrr/harbrr/internal/domain
      # gazelle's authStrategy (ADR 0003) is the same shape: Prepare/Recover already
      # return gazelle-prefixed, sentinel-bearing errors (login.ErrLoginFailed via
      # ensureSession/renewSession/loginLocked), so a caller re-wrapping them would only
      # double the prefix.
      ignore-interface-regexps:
        - authStrategy
    interfacebloat:
      # Guardrail against future god-interfaces (default 10). AGENTS.md's "interfaces
      # ≤5 methods" stays a review norm, not a hard gate — torznabhttp.Indexer
      # legitimately sits at 6, and native.Driver composes the Searcher (5) + Tester roles.
      max: 10
    exhaustive:
      default-signifies-exhaustive: false
    gosec:
      excludes:
        - G115
    funlen:
      lines: 80
      statements: 50
      ignore-comments: true
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 20
    nestif:
      min-complexity: 5

  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      # Tests get table-driven length and helper-assertion latitude.
      - path: _test\.go
        linters:
          - funlen
          - gocognit
          - gocyclo
          - forcetypeassert
          - wrapcheck
          - bodyclose # short-lived test responses; leaks only matter in production code
      # Synthetic credentials live only in *_test.go (AGENTS.md "Security"), which
      # trips gosec's hardcoded-credentials check (G101). The same paths are
      # allowlisted for gitleaks/check-no-secrets; G101 stays fully active on
      # production code. Scoped to G101 so other gosec checks still run in tests.
      - path: _test\.go
        text: "G101"
        linters:
          - gosec
