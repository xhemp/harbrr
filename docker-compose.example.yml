# Sample docker-compose for harbrr. Copy to docker-compose.yml and adjust.
#
# The /config volume holds the SQLite database and the auto-generated encryption
# keyfile — back it up. harbrr runs as uid 1000; ensure the mounted directory is
# writable by that user (e.g. `chown 1000:1000 ./data`).

services:
  harbrr:
    # Build locally, or replace with a published image once available.
    build: .
    # image: ghcr.io/nitrobass24/harbrr:latest
    container_name: harbrr
    restart: unless-stopped
    ports:
      - "7474:7474"
    volumes:
      - ./data:/config
    environment:
      - HARBRR_LOG_LEVEL=info
      # Set true when terminating TLS at a reverse proxy in front of harbrr:
      # - HARBRR_SERVER_SECURE_COOKIE=true
