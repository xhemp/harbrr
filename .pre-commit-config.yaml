# https://pre-commit.com — set up with: pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        # website/package-lock.json is a generated Docusaurus/npm lockfile —
        # legitimately >500KB, not an accidental binary commit.
        exclude: ^website/package-lock\.json$

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: local
    hooks:
      - id: golangci-lint
        name: golangci-lint
        entry: golangci-lint run
        language: system
        types: [go]
        pass_filenames: false

      - id: gofumpt
        name: gofumpt
        entry: gofumpt -l -w .
        language: system
        types: [go]
        pass_filenames: false

      - id: no-tracker-secrets
        name: no-tracker-secrets
        entry: scripts/check-no-secrets.sh
        language: system
        pass_filenames: false

      - id: no-vendored-def-edits
        name: no-vendored-def-edits
        entry: scripts/check-vendor-untouched.sh
        language: system
        pass_filenames: false
